<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>eqt-desktop</title>
    <script>
      if (!window.runtime) {
        window.runtime = { EventsOn: () => {}, EventsOnMultiple: () => {}, OnFileDrop: () => {}, LogInfo: () => {}, LogError: () => {} };
      }
      if (!window.go) {
        window.go = { main: { App: new Proxy({}, { get: () => () => Promise.resolve({}) }) } };
      }
    </script>
</head>
<body>
<div id="app"></div>
<script src="./src/main.ts" type="module"></script>
</body>
</html>
