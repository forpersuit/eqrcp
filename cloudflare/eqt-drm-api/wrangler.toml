name = "eqt-drm-api"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# D1 Database binding. DB is bound in the code.
[[d1_databases]]
binding = "DB"
database_name = "eqt-drm-db"
# Replace with your actual D1 Database ID after running `wrangler d1 create eqt-drm-db`
database_id = "f77e30fd-6dee-4062-a916-e8f4f717036d"

[vars]
# Public CDN base for installs/updates (NOT a secret — see docs/admin/IMPORTANT_drm-secrets.md)
R2_PUBLIC_URL = "https://download.eqt.net.im"
# Production lock: Admin API accepts Cloudflare Access JWT only (X-Admin-Secret disabled)
CF_ACCESS_REQUIRE_JWT = "true"
CF_ACCESS_ALLOWED_EMAILS = "admin@eqt.net.im"
MAIL_SENDER = "noreply@eqt.net.im"
