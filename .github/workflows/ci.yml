name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  go-test:
    name: Go test (root module)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o /tmp/eqrcp .

  go-test-desktop:
    name: Go test (desktop GUI module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install Wails system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Test desktop module
        working-directory: desktop/gui
        run: |
          go mod download
          go vet ./...
          go test ./...

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/gui/frontend/package-lock.json
      - name: Install dependencies
        working-directory: desktop/gui/frontend
        run: npm ci
      - name: Build frontend
        working-directory: desktop/gui/frontend
        run: npm run build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    # Advisory until baseline cleanup pass — see roadmap A2.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
