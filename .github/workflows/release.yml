name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-wails-windows:
    name: Release Windows GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/gui/frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Chat v2 frontend
        working-directory: pkg/chat/v2/web
        run: |
          npm ci
          npm run build
      - name: Build Wails (windows/amd64)
        working-directory: desktop/gui
        run: wails build -clean -platform windows/amd64
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p out
          cp desktop/gui/build/bin/eqt-desktop.exe out/eqt-desktop-windows-amd64.exe
      - name: Generate Update Signature
        shell: bash
        run: |
          go run scripts/generate-update-sig/main.go out/eqt-desktop-windows-amd64.exe
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wails-windows-artifacts
          path: out/*

  deploy:
    name: Deploy to GitHub Release & Cloudflare Pages
    needs: [release-wails-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp-artifacts
      - name: Consolidate artifacts
        run: |
          mkdir -p out
          find temp-artifacts -type f -exec cp {} out/ \;
          ls -R out
      - name: Generate static update-metadata.json
        run: |
          go run scripts/generate-update-metadata/main.go ${{ github.ref_name }} out cloudflare/eqt-website/update-metadata.json
          cp cloudflare/eqt-website/update-metadata.json out/update-metadata.json
      - name: Copy download assets to website static folder
        run: |
          mkdir -p cloudflare/eqt-website/downloads/latest
          mkdir -p cloudflare/eqt-website/downloads/${{ github.ref_name }}
          cp -r out/* cloudflare/eqt-website/downloads/latest/
          cp -r out/* cloudflare/eqt-website/downloads/${{ github.ref_name }}/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: out/*
      - name: Deploy static site to Cloudflare Pages
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx wrangler pages deploy cloudflare/eqt-website --project-name=eqt --branch=master
          else
            echo "CLOUDFLARE_API_TOKEN is not set, skipping Cloudflare Pages deployment."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Deploy to Cloudflare R2
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            BUCKET="${R2_BUCKET_NAME:-eqt-downloads}"
            echo "Uploading artifacts to Cloudflare R2 bucket: $BUCKET"
            for file in out/*; do
              filename=$(basename "$file")
              echo "Uploading $filename to downloads/${{ github.ref_name }}/$filename ..."
              npx wrangler r2 object put "$BUCKET/downloads/${{ github.ref_name }}/$filename" --file "$file"
              echo "Uploading $filename to downloads/latest/$filename ..."
              npx wrangler r2 object put "$BUCKET/downloads/latest/$filename" --file "$file"
            done
          else
            echo "CLOUDFLARE_API_TOKEN is not set, skipping R2 deployment."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
