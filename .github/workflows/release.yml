name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-wails-windows:
    name: Release Windows GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/gui/frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Wails (windows/amd64)
        working-directory: desktop/gui
        run: wails build -clean -platform windows/amd64
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p out
          cp desktop/gui/build/bin/eqt-desktop.exe out/eqt-desktop-windows-amd64.exe
      - name: Generate Update Signature
        shell: bash
        run: |
          go run scripts/generate-update-sig/main.go out/eqt-desktop-windows-amd64.exe
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: out/*
      - name: Upload to Cloudflare R2
        if: secrets.R2_ACCESS_KEY_ID != ''
        shell: bash
        run: |
          aws s3 cp out/ s3://${{ secrets.R2_BUCKET_NAME }}/downloads/${{ github.ref_name }}/ --recursive --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          aws s3 cp out/ s3://${{ secrets.R2_BUCKET_NAME }}/downloads/latest/ --recursive --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

  release-wails-linux:
    name: Release Linux GUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/gui/frontend/package-lock.json
      - name: Install Wails system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Wails (linux/amd64)
        working-directory: desktop/gui
        run: wails build -clean -tags webkit2_41
      - name: Stage artifacts
        run: |
          mkdir -p out
          cd desktop/gui/build/bin
          tar -czf "$GITHUB_WORKSPACE/out/eqt-desktop-linux-amd64.tar.gz" eqt-desktop
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: out/*
      - name: Upload to Cloudflare R2
        if: secrets.R2_ACCESS_KEY_ID != ''
        run: |
          aws s3 cp out/ s3://${{ secrets.R2_BUCKET_NAME }}/downloads/${{ github.ref_name }}/ --recursive --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          aws s3 cp out/ s3://${{ secrets.R2_BUCKET_NAME }}/downloads/latest/ --recursive --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
