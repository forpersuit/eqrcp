name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-wails-windows:
    name: Release Windows GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/gui/frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Wails (windows/amd64)
        working-directory: desktop/gui
        run: wails build -clean -platform windows/amd64
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p out
          cp desktop/gui/build/bin/eqt-desktop.exe out/eqt-desktop-windows-amd64.exe
      - name: Generate Update Signature
        shell: bash
        run: |
          go run scripts/generate-update-sig/main.go out/eqt-desktop-windows-amd64.exe
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wails-windows-artifacts
          path: out/*

  release-wails-linux:
    name: Release Linux GUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/gui/frontend/package-lock.json
      - name: Install Wails system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Wails (linux/amd64)
        working-directory: desktop/gui
        run: wails build -clean -tags webkit2_41
      - name: Stage artifacts
        run: |
          mkdir -p out
          cd desktop/gui/build/bin
          tar -czf "$GITHUB_WORKSPACE/out/eqt-desktop-linux-amd64.tar.gz" eqt-desktop
      - name: Generate Update Signature
        run: |
          go run scripts/generate-update-sig/main.go out/eqt-desktop-linux-amd64.tar.gz
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wails-linux-artifacts
          path: out/*

  deploy:
    name: Deploy to GitHub Release & Cloudflare Pages
    needs: [release-wails-windows, release-wails-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp-artifacts
      - name: Consolidate artifacts
        run: |
          mkdir -p out
          find temp-artifacts -type f -exec cp {} out/ \;
          ls -R out
      - name: Generate static update-metadata.json
        run: |
          go run scripts/generate-update-metadata/main.go ${{ github.ref_name }} out website/update-metadata.json
      - name: Copy download assets to website static folder
        run: |
          mkdir -p website/downloads/latest
          mkdir -p website/downloads/${{ github.ref_name }}
          cp -r out/* website/downloads/latest/
          cp -r out/* website/downloads/${{ github.ref_name }}/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: out/*
      - name: Deploy static site to Cloudflare Pages
        if: secrets.CLOUDFLARE_API_TOKEN != ''
        run: |
          npx wrangler pages deploy website --project-name=eqt-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
