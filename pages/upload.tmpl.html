<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Send to EQT</title>
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #fff;
            --surface-soft: #f7faf9;
            --line: #d8e0dd;
            --text: #17211f;
            --muted: #66736f;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #b42318;
        }
        * {
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        main {
            margin: 0 auto;
            max-width: 760px;
            padding: 22px 16px 34px;
        }
        .brand {
            align-items: center;
            display: grid;
            gap: 12px;
            grid-template-columns: 52px minmax(0, 1fr);
            margin-bottom: 18px;
        }
        .upload-logo {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
            height: 52px;
            padding: 7px;
            width: 52px;
        }
        h1 {
            font-size: clamp(28px, 8vw, 42px);
            line-height: 1.05;
            margin: 0 0 6px;
        }
        p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
        .upload-composer {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.07);
            padding: 16px;
        }
        .composer-meta {
            align-items: center;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .label {
            color: var(--text);
            display: block;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }
        .composer-actions {
            display: flex;
            flex-shrink: 0;
        }
        .composer-grid {
            display: grid;
            gap: 12px;
        }
        label {
            color: #334155;
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input,
        textarea,
        .btn {
            border-radius: 6px;
            font: inherit;
        }
        .form-control {
            background: #fff;
            border: 1px solid #cbd5e1;
            color: var(--text);
            min-height: 44px;
            padding: 11px 12px;
            width: 100%;
        }
        textarea.form-control {
            line-height: 1.55;
            min-height: 180px;
            resize: vertical;
        }
        .form-control:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            outline: none;
        }
        .btn {
            align-items: center;
            background: var(--accent);
            border: 0;
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            font-size: 14px;
            font-weight: 800;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: var(--accent-strong);
        }
        .btn-secondary {
            background: #334155;
        }
        .submit-row {
            display: grid;
            margin-top: 2px;
        }
        #submit:disabled {
            cursor: default;
            opacity: 0.7;
        }
        #selected-file-container,
        #pasted-file-container {
            display: grid;
            gap: 10px;
        }
        .pasted-file-wrapper {
            background: var(--surface-soft);
            border: 1px dashed #86b7b1;
            border-radius: 8px;
            padding: 10px;
        }
        .file-info {
            align-items: center;
            display: grid;
            gap: 10px;
            grid-template-columns: 34px minmax(0, 1fr);
        }
        .file-icon {
            align-items: center;
            background: #e7f3f1;
            border-radius: 6px;
            color: var(--accent);
            display: inline-flex;
            font-size: 20px;
            height: 34px;
            justify-content: center;
            width: 34px;
        }
        .file-name {
            color: var(--text);
            font-size: 14px;
            overflow-wrap: anywhere;
        }
        .pasted-file-wrapper img {
            border-radius: 6px;
            display: block;
            height: auto;
            max-width: 100%;
        }
        .error {
            color: var(--danger);
            font-size: 13px;
            min-height: 18px;
        }
        @media (max-width: 560px) {
            main {
                padding: 16px 12px 28px;
            }
            .composer-meta {
                align-items: stretch;
                flex-direction: column;
            }
            .composer-actions,
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main>
        <header class="brand">
            <img class="upload-logo" src="/assets/eqt-logo-mark.png" alt="EQT logo">
            <div>
                <h1>Send to this device</h1>
                <p>Add files, paste an image, or write text. EQT saves everything on the receiving computer.</p>
            </div>
        </header>
        <form id="upload-form" class="upload-composer">
            <div class="composer-meta">
                <div>
                    <strong class="label">Composer</strong>
                    <div class="hint">Text becomes a .txt file. Shift+Enter keeps a new line.</div>
                </div>
                <div class="composer-actions">
                    <label for="files" class="btn btn-secondary">Add files</label>
                    <input class="form-control-file" type="file" id="files" name="files" multiple hidden>
                </div>
            </div>
            <div class="composer-grid">
                <div>
                    <label for="plaintext-title">Text file name</label>
                    <input class="form-control" id="plaintext-title" placeholder="Optional file name">
                </div>
                <div>
                    <label for="plaintext-text">Text</label>
                    <textarea class="form-control" id="plaintext-text" placeholder="Write text or paste files here"></textarea>
                </div>
                <div id="selected-file-container"></div>
                <div id="pasted-file-container"></div>
                <div class="error" id="upload-error" aria-live="polite"></div>
                <div class="submit-row">
                    <input class="btn" type="submit" id="submit" name="submit" value="Transfer">
                </div>
            </div>
        </form>
    </main>
    <script>
        var uploadForm = document.getElementById('upload-form');
        var pastedFiles = [];
        var draftKey = 'eqrcp-upload-draft:' + window.location.pathname;
        var submitButton = document.getElementById('submit');
        var titleInput = document.getElementById('plaintext-title');
        var textArea = document.getElementById('plaintext-text');
        var fileInput = document.getElementById('files');
        var selectedFileContainer = document.getElementById('selected-file-container');
        var pastedFileContainer = document.getElementById('pasted-file-container');
        var errorBox = document.getElementById('upload-error');

        function readDraft() {
            try {
                var raw = window.localStorage.getItem(draftKey);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function saveDraft() {
            var draft = {
                title: titleInput.value,
                text: textArea.value
            };
            try {
                if (!draft.title && !draft.text) {
                    window.localStorage.removeItem(draftKey);
                    return;
                }
                window.localStorage.setItem(draftKey, JSON.stringify(draft));
            } catch (e) {
                // Draft storage is best-effort only.
            }
        }

        function clearDraft() {
            try {
                window.localStorage.removeItem(draftKey);
            } catch (e) {
                // Ignore storage failures when clearing.
            }
        }

        function restoreDraft() {
            var draft = readDraft();
            if (!draft) { return; }
            titleInput.value = draft.title || '';
            textArea.value = draft.text || '';
        }

        function resizeTextArea() {
            textArea.style.height = 'auto';
            textArea.style.height = Math.min(textArea.scrollHeight, 260) + 'px';
        }

        function updateDraftState() {
            resizeTextArea();
            saveDraft();
        }

        function appendPastedFile(blob, index) {
            if (!blob) { return; }
            pastedFiles.push(blob);

            var fileWrapper = document.createElement('div');
            fileWrapper.className = 'pasted-file-wrapper';

            if (blob.type && blob.type.indexOf('image/') === 0) {
                var img = document.createElement('img');
                img.src = URL.createObjectURL(blob);
                img.alt = blob.name || 'Pasted image';
                fileWrapper.appendChild(img);
            } else {
                var fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';

                var fileIcon = document.createElement('span');
                fileIcon.className = 'file-icon';
                fileIcon.innerHTML = '&#128196;';

                var fileName = document.createElement('span');
                fileName.className = 'file-name';
                fileName.textContent = blob.name || ('Pasted File ' + (index + 1));

                fileInfo.appendChild(fileIcon);
                fileInfo.appendChild(fileName);
                fileWrapper.appendChild(fileInfo);
            }

            pastedFileContainer.appendChild(fileWrapper);
        }

        function renderSelectedFiles() {
            selectedFileContainer.innerHTML = '';
            if (!fileInput.files || !fileInput.files.length) { return; }
            for (var i = 0; i < fileInput.files.length; i++) {
                var file = fileInput.files[i];
                var fileWrapper = document.createElement('div');
                fileWrapper.className = 'pasted-file-wrapper';
                var fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';
                var fileIcon = document.createElement('span');
                fileIcon.className = 'file-icon';
                fileIcon.innerHTML = '&#128196;';
                var fileName = document.createElement('span');
                fileName.className = 'file-name';
                fileName.textContent = file.name;
                fileInfo.appendChild(fileIcon);
                fileInfo.appendChild(fileName);
                fileWrapper.appendChild(fileInfo);
                selectedFileContainer.appendChild(fileWrapper);
            }
        }

        function readClipboardFiles(clipboardData) {
            var files = [];
            if (!clipboardData) { return files; }
            if (clipboardData.items && clipboardData.items.length) {
                for (var i = 0; i < clipboardData.items.length; i++) {
                    var item = clipboardData.items[i];
                    if (item.kind === 'file') {
                        var blob = item.getAsFile();
                        if (blob) { files.push(blob); }
                    }
                }
            } else if (clipboardData.files && clipboardData.files.length) {
                for (var j = 0; j < clipboardData.files.length; j++) {
                    files.push(clipboardData.files[j]);
                }
            }
            return files;
        }

        function insertTextAtCursor(value) {
            if (!value) { return; }
            if (typeof textArea.setRangeText === 'function' && typeof textArea.selectionStart === 'number') {
                textArea.setRangeText(value, textArea.selectionStart, textArea.selectionEnd, 'end');
            } else {
                var start = textArea.selectionStart || textArea.value.length;
                var end = textArea.selectionEnd || textArea.value.length;
                textArea.value = textArea.value.slice(0, start) + value + textArea.value.slice(end);
            }
            textArea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        textArea.addEventListener('paste', function(e) {
            var clipboardData = e.clipboardData || window.clipboardData;
            var files = readClipboardFiles(clipboardData);
            if (!files.length) { return; }
            e.preventDefault();
            var pastedText = clipboardData && clipboardData.getData ? clipboardData.getData('text/plain') : '';
            if (pastedText) {
                insertTextAtCursor(pastedText);
            }
            for (var i = 0; i < files.length; i++) {
                appendPastedFile(files[i], i);
            }
            saveDraft();
        });

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            errorBox.textContent = '';
            submitButton.value = 'Transferring...';
            submitButton.disabled = true;
            var formData = new FormData(uploadForm);
            var textInput = document.getElementById('plaintext-text');

            if (titleInput.value || textInput.value) {
                var currentDate = new Date().toJSON().slice(0, 19).replace(/[-T:]/g, '_');
                var filename = titleInput.value || ('eqrcp-text-file-' + currentDate);
                var blob = new Blob([textInput.value + '\n'], { type: 'text/plain' });
                formData.append('textFile', blob, filename + '.txt');
            }

            for (var i = 0; i < pastedFiles.length; i++) {
                var file = pastedFiles[i];
                var fileName = file.name || ('pasted_file_' + i);
                formData.append('files', file, fileName);
            }

            fetch('{{.Route}}', {
                method: 'POST',
                body: formData
            }).then(function(response) {
                if (!response.ok) {
                    throw new Error('Upload failed');
                }
                return response.text();
            }).then(function(html) {
                clearDraft();
                pastedFiles = [];
                pastedFileContainer.innerHTML = '';
                var parser = new DOMParser();
                var nextDoc = parser.parseFromString(html, 'text/html');
                document.title = nextDoc.title || document.title;
                document.head.innerHTML = nextDoc.head.innerHTML;
                document.body.innerHTML = nextDoc.body.innerHTML;
            }).catch(function() {
                errorBox.textContent = 'Transfer failed. Keep this page open and try again.';
                submitButton.value = 'Transfer';
                submitButton.disabled = false;
            });
        });

        titleInput.addEventListener('input', updateDraftState);
        textArea.addEventListener('input', updateDraftState);
        fileInput.addEventListener('change', renderSelectedFiles);
        window.addEventListener('beforeunload', function(e) {
            if (!titleInput.value.trim() && !textArea.value.trim() && !pastedFiles.length) {
                return;
            }
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        restoreDraft();
        resizeTextArea();
    </script>
</body>
</html>
