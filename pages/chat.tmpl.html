                period: '/ yr',
                feature1: 'Unlimited chat duration',
                feature2: 'No limit on file & image sizes',
                feature3: 'Smoother multi-device sync',
                subscribeBtn: 'Subscribe Now ($11.99/yr)',
                subscribeProgress: 'Subscribing...',
                subscribeSuccess: 'Subscribed successfully! 🎉',
                subscribeFail: 'Subscription failed, retry',
                hint: 'Supports mock payment for testing. Active immediately.',
                premium: 'PREMIUM',
                titleAttr: 'Click to view subscription details'
            }
        };

        var dict = i18n[lang];
        var limitState = {
            usedSeconds: 0,
            isPaid: false
        };

        function initPayModalDOM() {
            var backdrop = document.getElementById('pay-modal-backdrop');
            if (!backdrop) return;
            backdrop.innerHTML = `
                <div class="pay-modal">
                    <div class="pay-modal-glow"></div>
                    <button class="pay-modal-close" id="pay-modal-close" type="button" aria-label="Close">
                        <svg viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                    </button>
                    <div class="pay-modal-header">
                        <div class="pay-badge">${dict.premium}</div>
                        <h2>${dict.title}</h2>
                        <p>${dict.description}</p>
                    </div>
                    <div class="pay-modal-pricing">
                        <span class="price-value">${dict.price}</span>
                        <span class="price-period">${dict.period}</span>
                    </div>
                    <div class="pay-features">
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <span>${dict.feature1}</span>
                        </div>
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <span>${dict.feature2}</span>
                        </div>
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <span>${dict.feature3}</span>
                        </div>
                    </div>
                    <div class="pay-modal-actions">
                        <button class="pay-btn-primary" id="subscribe-button">
                            <span>${dict.subscribeBtn}</span>
                            <div class="shimmer"></div>
                        </button>
                        <p class="pay-modal-hint">${dict.hint}</p>
                    </div>
                </div>
            `;
            
            // Re-bind actions to new elements
            document.getElementById('pay-modal-close').addEventListener('click', function() {
                document.getElementById('pay-modal-backdrop').classList.remove('open');
            });
            
            document.getElementById('subscribe-button').addEventListener('click', function() {
                var btn = this;
                if (btn.disabled) return;
                btn.disabled = true;
                var textSpan = btn.querySelector('span');
                textSpan.textContent = dict.subscribeProgress;
                
                var payURL = withClientJoin(withClientAvatar(withClientTheme(withClientPeer(withClientToken('{{.PayRoute}}')))));
                fetch(payURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pay: true })
                })
                .then(function(r) {
                    if (!r.ok) {
                        throw new Error('Payment failed');
                    }
                    return r.json();
                })
                .then(function(data) {
                    btn.disabled = false;
                    textSpan.textContent = dict.subscribeSuccess;
                    setTimeout(function() {
                        textSpan.textContent = dict.subscribeBtn;
                        updateLimitUI(data);
                    }, 1500);
                })
                .catch(function(err) {
                    btn.disabled = false;
                    textSpan.textContent = dict.subscribeFail;
                    setTimeout(function() {
                        textSpan.textContent = dict.subscribeBtn;
                    }, 2000);
                });
            });
        }

        function updateLimitUI(data) {
            if (!data) return;
            var usedSeconds = data.usedSeconds || 0;
            var isPaid = !!data.isPaid;
            limitState.usedSeconds = usedSeconds;
            limitState.isPaid = isPaid;

            var pill = document.getElementById('limit-status-pill');
            var pillText = document.getElementById('limit-status-text');
            pill.setAttribute('title', dict.titleAttr);
            
            if (isPaid) {
                pill.style.display = 'inline-flex';
                pill.className = 'limit-status-pill paid';
                pillText.textContent = dict.proActive;
                
                textEl.disabled = false;
                fileEl.disabled = false;
                textEl.placeholder = dict.messagePlaceholder;
                document.getElementById('pay-modal-backdrop').classList.remove('open');
            } else {
                pill.style.display = 'inline-flex';
                var remaining = Math.max(0, 300 - usedSeconds);
                var mins = Math.floor(remaining / 60);
                var secs = remaining % 60;
                var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
                
                if (remaining <= 0) {
                    pill.className = 'limit-status-pill danger';
                    pillText.textContent = dict.limitReached;
                    textEl.disabled = true;
                    fileEl.disabled = true;
                    textEl.placeholder = dict.upgradePlaceholder;
                    document.getElementById('pay-modal-backdrop').classList.add('open');
                } else {
                    textEl.disabled = false;
                    fileEl.disabled = false;
                    textEl.placeholder = dict.messagePlaceholder;
                    pillText.textContent = timeStr;
                    if (remaining <= 60) {
                        pill.className = 'limit-status-pill warning';
                    } else {
                        pill.className = 'limit-status-pill';
                    }
                }
            }
        }

        // Initialize dynamic i18n DOM
        initPayModalDOM();

        // 定时器模拟时间流逝（每秒）
        setInterval(function() {
            if (isPageVisible && events && events.readyState === EventSource.OPEN && !limitState.isPaid) {
                if (limitState.usedSeconds < 300) {
                    limitState.usedSeconds++;
                    updateLimitUI(limitState);
                }
            }
        }, 1000);

        // 绑定事件
        document.getElementById('limit-status-pill').addEventListener('click', function() {
            document.getElementById('pay-modal-backdrop').classList.add('open');
        });
        document.getElementById('pay-modal-backdrop').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('open');
            }
        });
    </script>
    
    <div class="pay-modal-backdrop" id="pay-modal-backdrop"></div>
</body>
</html>
