<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Device Limit Exceeded - EQT</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #e11d48;
            --accent-gradient: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            --accent-light: #fff1f2;
            --accent-border: #fecdd3;
            --line: #e2e8f0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        main {
            width: min(100%, 480px);
            text-align: center;
        }

        .brand-logo {
            display: block;
            height: auto;
            max-width: 130px;
            margin: 0 auto 32px;
        }

        .status-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-gradient);
        }

        .error-badge {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--accent-light);
            border: 2px solid var(--accent-border);
            color: var(--accent);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(225, 29, 72, 0.08);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            margin-bottom: 12px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .summary {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.15);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(225, 29, 72, 0.25);
        }

        .lang-switch-container {
            margin-top: 24px;
        }

        .lang-switch-container select {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 6px 12px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .lang-switch-container select:hover {
            border-color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <main>
        <img class="brand-logo" src="/assets/eqt-logo-horizontal.png" alt="EQT logo">
        
        <div class="status-card">
            <div class="error-badge">⚠️</div>
            <h1 id="header-text" data-i18n="header">Device Limit Exceeded</h1>
            <p id="summary-text" class="summary" data-i18n="summary">According to the free tier rules, daily non-first transfers allow up to 2 devices. This transfer has reached the device limit. Please upgrade to continue.</p>
            <a href="https://eqt.net.im" class="btn" id="btn-action" data-i18n="btn">Upgrade License</a>
        </div>

        <div class="lang-switch-container">
            <select id="page-lang-select" aria-label="Switch Language">
                <option value="zh">简体中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="es">Español</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </main>

    <script>
        var pageTranslations = {
            zh: {
                title: '设备数量超限 - EQT',
                header: '设备连接数已超限',
                summary: '根据免费版使用规则，每日非首次传输任务最多允许连接 2 台设备。当前任务已达到可连接设备数上限，请升级许可证以接入更多设备。',
                btn: '了解 EQT 专业版'
            },
            en: {
                title: 'Device Limit Exceeded - EQT',
                header: 'Device Limit Exceeded',
                summary: 'According to the free tier rules, daily non-first transfers allow up to 2 devices. This transfer has reached the device limit. Please upgrade to continue.',
                btn: 'Upgrade License'
            },
            ja: {
                title: '接続デバイス上限超過 - EQT',
                header: '接続数上限を超過しました',
                summary: '無料版の制限ルールにより、1日あたり2回目以降의 転送では最大2台のデバイスまで接続可能です。この転送は上限に達しました。続行するにはアップグレードしてください。',
                btn: 'ライセンスをアップグレード'
            },
            ko: {
                title: '연결 기기 초과 - EQT',
                header: '연결 기기 수 초과됨',
                summary: '무료 버전 정책에 따라, 일일 첫 번째가 아닌 전송은 최대 2대의 기기까지만 연결할 수 있습니다. 기기 제한에 도달했습니다. 계속하려면 업그레이드하십시오.',
                btn: '라이선스 업그레이드'
            },
            es: {
                title: 'Límite de Dispositivos Excedido - EQT',
                header: 'Límite de Dispositivos Superado',
                summary: 'De acuerdo con las reglas de la versión gratuita, las transferencias diarias no iniciales permiten hasta 2 dispositivos. Se ha alcanzado el límite. Actualice para continuar.',
                btn: 'Actualizar Licencia'
            },
            de: {
                title: 'Gerätelimit überschritten - EQT',
                header: 'Gerätelimit überschritten',
                summary: 'Gemäß den Regeln der kostenlosen Version sind bei täglichen Folgeübertragungen maximal 2 Geräte zulässig. Dieses Limit wurde erreicht. Bitte upgraden Sie, um fortzufahren.',
                btn: 'Lizenz upgraden'
            },
            fr: {
                title: 'Limite d\'appareils dépassée - EQT',
                header: 'Limite d\'appareils dépassée',
                summary: 'Selon les règles de la version gratuite, les transferts quotidiens suivants autorisent jusqu\'à 2 appareils. Cette limite a été atteinte. Veuillez mettre à niveau pour continuer.',
                btn: 'Mettre à niveau'
            }
        };

        function getCookie(name) {
            var value = "; " + document.cookie;
            var parts = value.split("; " + name + "=");
            if (parts.length === 2) return decodeURIComponent(parts.pop().split(";").shift());
            return null;
        }

        function setCookie(name, val) {
            var d = new Date();
            d.setTime(d.getTime() + (365*24*60*60*1000));
            var expires = "expires="+ d.toUTCString();
            document.cookie = name + "=" + encodeURIComponent(val) + ";" + expires + ";path=/";
        }

        var currentLang = 'en';
        var savedLang = window.localStorage.getItem('eqt_lang') || window.localStorage.getItem('eqt-page-lang');
        var cfCookie = getCookie('eqt-lang');
        var userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
        var supportedLangs = ['zh', 'en', 'ja', 'ko', 'es', 'de', 'fr'];
        
        if (savedLang && supportedLangs.indexOf(savedLang) !== -1) {
            currentLang = savedLang;
        } else if (cfCookie && supportedLangs.indexOf(cfCookie) !== -1) {
            currentLang = cfCookie;
        } else if (supportedLangs.indexOf(userLang) !== -1) {
            currentLang = userLang;
        }

        function applyLanguage() {
            var dict = pageTranslations[currentLang] || pageTranslations['en'];
            
            var headerEl = document.getElementById('header-text');
            if (headerEl) headerEl.textContent = dict.header;
            
            var summaryEl = document.getElementById('summary-text');
            if (summaryEl) summaryEl.textContent = dict.summary;

            var btnEl = document.getElementById('btn-action');
            if (btnEl) btnEl.textContent = dict.btn;
            
            document.title = dict.title;
            
            var langSelect = document.getElementById('page-lang-select');
            if (langSelect) langSelect.value = currentLang;
        }

        applyLanguage();

        var langSelect = document.getElementById('page-lang-select');
        if (langSelect) {
            langSelect.addEventListener('change', function(e) {
                var newLang = e.target.value;
                if (supportedLangs.indexOf(newLang) !== -1) {
                    currentLang = newLang;
                    window.localStorage.setItem('eqt_lang', currentLang);
                    window.localStorage.setItem('eqt-page-lang', currentLang);
                    setCookie('eqt-lang', currentLang);
                    applyLanguage();
                }
            });
        }
    </script>
</body>
</html>
