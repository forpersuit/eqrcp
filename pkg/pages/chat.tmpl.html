
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>EQT Chat</title>
    <script>
        if (window.parent !== window) { document.documentElement.classList.add('embedded-chat'); }
    </script>
    <script src="/assets/tus.min.js"></script>
    <style>
        :root {
            --ink: #18211f;
            --muted: #61706b;
            --line: #d7ded7;
            --panel: #ffffff;
            --accent: #156f5a;
            --accent-strong: #0d4e42;
            --accent-rgb: 21,111,90;
            --danger: #a63232;
            --wash: #edf2eb;
            --bg: #f4f7f4;
            --chat-viewport-height: 100vh;
            --chat-viewport-width: 100vw;
            --chat-viewport-top: 0px;
            --chat-viewport-left: 0px;
            --chat-head-height: 62px;
            --message-actions-min-width: 58px;
            --messages-bottom-space: clamp(16px, 2.2vh, 22px);
        }
        @supports (height: 100dvh) {
            :root { --chat-viewport-height: 100dvh; }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overscroll-behavior: none;
        }
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI Variable Display", "Segoe UI", "Aptos", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 15px;
            overflow: hidden;
        }
        .chat-viewport {
            height: 100%;
            overflow: hidden;
            width: 100%;
        }
        main {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 14px;
            height: 100%;
            max-width: 860px;
            margin: 0 auto;
            padding: 16px 28px;
        }
        html.embedded-chat body { background: transparent; }
        html.embedded-chat .chat-viewport { height: 100%; }
        html.embedded-chat main {
            max-width: none;
            padding: 8px;
        }
        html.embedded-chat .chat-shell {
            border-radius: 12px;
            height: 100%;
        }
        html.embedded-chat .chat-head {
            border-radius: 0;
            min-height: 54px;
            padding: 9px 12px;
        }
        html.embedded-chat .chat-logo {
            display: none !important;
        }
        html.embedded-chat .chat-head-title h1 {
            display: none !important;
        }
        /* ── Chat shell ── */
        .chat-shell {
            background: linear-gradient(180deg, #ffffff 0%, #fbfcfa 100%);
            border: 1px solid var(--line);
            border-radius: 12px;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }
        /* ── Header ── */
        .chat-head {
            align-items: center;
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 12px;
            justify-content: space-between;
            padding: 12px 16px;
        }
        .chat-head.offline h1 { color: var(--muted); }
        .chat-head-title {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .chat-title-container {
            min-width: 0;
            display: flex;
            align-items: center;
        }
        .chat-head-title h1 {
            color: var(--accent-strong);
            transition: color 0.16s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            max-width: 100%;
        }
        .license-badge {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            display: inline-block;
            line-height: 1.2;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .license-badge.clock-error {
            background: rgba(220, 38, 38, 0.08) !important;
            color: #dc2626 !important;
            border: 1.2px solid #dc2626 !important;
            box-sizing: border-box;
            cursor: help;
        }
        .chat-logo {
            flex-shrink: 0;
            height: 34px;
            width: 34px;
        }
        h1 {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }
        .head-actions {
            display: inline-flex;
            gap: 8px;
            position: relative;
        }
        .device-pill {
            align-items: center;
            background: #f4f8f4;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--accent-strong);
            cursor: pointer;
            display: inline-flex;
            font-size: 12px;
            font-weight: 800;
            gap: 7px;
            height: 36px;
            overflow: hidden;
            padding: 0 11px;
            -webkit-tap-highlight-color: transparent;
        }
        .device-pill svg {
            fill: none;
            height: 16px;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2;
            width: 16px;
        }
        .device-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 18px 36px rgba(24, 33, 31, 0.16);
            display: none;
            gap: 10px;
            min-width: 260px;
            padding: 12px;
            position: absolute;
            right: 0;
            top: 44px;
            z-index: 10;
        }
        .device-panel.open { display: grid; }

        /* ── Language Panel ── */
        .lang-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 18px 36px rgba(24, 33, 31, 0.16);
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
            padding: 12px;
            position: absolute;
            right: 0;
            top: 44px;
            z-index: 1000;
        }
        .lang-panel.open {
            display: flex;
        }
        .lang-panel-title {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .lang-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .lang-option {
            background: none;
            border: none;
            color: var(--ink);
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: left;
            transition: background 0.15s ease, color 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .lang-option:hover {
            background: var(--wash);
            color: var(--accent-strong);
        }
        .lang-option.active {
            background: var(--accent);
            color: #ffffff;
            font-weight: 600;
        }

        /* ── License Panel ── */
        .license-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 18px 36px rgba(24, 33, 31, 0.16);
            display: none;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
            max-width: 320px;
            padding: 16px;
            position: absolute;
            right: 0;
            top: 44px;
            z-index: 10;
        }
        .license-panel.open {
            display: flex;
        }
        .license-panel-title {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .license-status-badge {
            align-self: flex-start;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            text-transform: uppercase;
        }
        .license-status-badge.success {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .license-status-badge.warning {
            background: rgba(234, 179, 8, 0.12);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }
        .license-status-badge.danger {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .license-details-box {
            display: grid;
            gap: 10px;
            font-size: 13px;
        }
        .license-info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            line-height: 1.4;
        }
        .license-info-row.flex-column {
            flex-direction: column;
            gap: 6px;
        }
        .license-info-row strong {
            color: var(--muted);
            font-weight: 600;
        }
        .license-info-row span {
            color: var(--accent-strong);
            word-break: break-all;
            text-align: right;
        }
        .license-info-row span.text-success {
            color: #22c55e;
        }
        .license-info-row span.text-danger {
            color: #ef4444;
        }
        .license-info-row span.font-bold {
            font-weight: 800;
        }
        .license-solution-text {
            color: var(--ink);
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            margin: 0;
        }
        .device-panel-title {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .device-roster {
            display: grid;
            gap: 9px;
        }
        .device-row-lite {
            align-items: center;
            background: transparent;
            border: 0;
            border-radius: 8px;
            color: inherit;
            cursor: pointer;
            display: grid;
            gap: 9px;
            grid-template-columns: 26px minmax(0, 1fr) auto;
            padding: 4px;
            text-align: left;
            width: 100%;
        }
        .device-row-lite:hover {
            background: var(--wash);
        }
        .device-row-lite svg {
            background: var(--wash);
            border: 1px solid transparent;
            border-radius: 999px;
            color: var(--accent-strong);
            fill: none;
            height: 26px;
            padding: 6px;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2;
            width: 26px;
        }
        .device-row-lite .message-avatar {
            font-size: 11px;
            height: 26px;
            width: 26px;
        }
        .device-row-lite strong {
            color: var(--device-text, inherit);
            display: block;
            font-size: 12px;
            line-height: 1.2;
        }
        .device-row-lite span {
            color: var(--device-muted, var(--muted));
            font-size: 11px;
        }
        .device-state {
            border-radius: 999px;
            color: var(--device-text, var(--accent-strong));
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .device-detail {
            border-top: 1px solid var(--line);
            display: none;
            gap: 8px;
            margin-top: 2px;
            padding-top: 10px;
        }
        .device-detail.open { display: grid; }
        .device-detail-head {
            align-items: center;
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .device-detail-head strong {
            color: var(--device-text, var(--accent-strong));
            font-size: 13px;
        }
        .device-detail-name-input {
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--device-text, var(--fg));
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            padding: 3px 6px;
            width: 140px;
            box-sizing: border-box;
        }
        .device-detail-actions {
            display: inline-flex;
            gap: 6px;
        }
        .device-detail-actions .icon-button {
            height: 30px;
            width: 30px;
        }
        .device-detail-meta {
            color: var(--muted);
            display: grid;
            font-size: 12px;
            gap: 4px;
        }
        .device-empty {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }
        .head-stop-form { display: contents; }
        .icon-button {
            align-items: center;
            background: var(--wash);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--ink);
            cursor: pointer;
            display: inline-flex;
            height: 36px;
            justify-content: center;
            overflow: hidden;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            width: 36px;
        }
        .icon-button:hover { background: #ddeade; }
        .icon-button.danger {
            background: #fff0ed;
            border-color: #f5c6c0;
            color: var(--danger);
        }
        .icon-button.danger:hover { background: #fde1dc; }
        .mobile-close-action { display: none; }
        .icon-button svg { height: 18px; width: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-button.qr-breathe {
            animation: qr-breathe-button 1.2s ease-in-out infinite;
            background: var(--wash);
            border-color: var(--line);
            box-shadow: 0 0 0 0 rgba(var(--accent-rgb, 21,111,90), 0);
            color: var(--accent-strong);
        }
        .icon-button.qr-breathe svg {
            animation: qr-breathe 1.2s ease-in-out infinite;
            transform-origin: center;
        }
        @keyframes qr-breathe {
            0%, 100% { opacity: 0.86; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.12); }
        }
        @keyframes qr-breathe-button {
            0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb, 21,111,90), 0); transform: scale(1); }
            50% { box-shadow: 0 0 0 5px rgba(var(--accent-rgb, 21,111,90), 0.14); transform: scale(1.03); }
        }
        /* ── Message thread ── */
        .messages {
            -webkit-overflow-scrolling: touch;
            background: linear-gradient(180deg, #f4f7f4 0%, #f8faf7 100%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 18px 16px var(--messages-bottom-space);
            overscroll-behavior: contain;
            scroll-padding-bottom: var(--messages-bottom-space);
            scrollbar-width: none;
            touch-action: pan-y;
            position: relative;
        }
        .messages::-webkit-scrollbar { display: none; }
        /* ── Empty state ── */
        .messages-empty {
            align-items: center;
            color: var(--muted);
            display: flex;
            flex: 1;
            flex-direction: column;
            font-size: 14px;
            gap: 10px;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .messages-empty svg { color: #b8cdbf; height: 46px; opacity: 0.9; width: 46px; }
        .messages-empty strong { color: var(--ink); display: block; font-size: 15px; }
        /* ── Individual message ── */
        .message {
            align-items: start;
            column-gap: 10px;
            display: grid;
            grid-template-columns: 40px minmax(0, 1fr);
            max-width: min(680px, 78%);
            position: relative;
            width: fit-content;
        }
        .message.mine {
            align-self: flex-end;
            grid-template-columns: minmax(0, 1fr) 40px;
        }
        .message:not(.mine):not(.system) {
            align-self: flex-start;
            align-items: flex-start;
        }
        .message.system {
            align-self: center;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            width: 100%;
        }
        .message.attachment-message {
            max-width: var(--attach-max, min(520px, 88%));
        }
        .message-main {
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: visible;
            position: relative;
            transition: padding-inline 0.16s ease;
        }
        .message.mine .message-main {
            align-items: flex-end;
        }
        .message:focus {
            outline: none;
        }
        .message:focus-visible .bubble {
            box-shadow: 0 0 0 2px rgba(var(--accent-rgb, 21,111,90), 0.16);
        }
        @media (min-width: 821px) {
            .message {
                max-width: min(680px, 61.8%);
            }
            :root { --attach-max: min(520px, 56%); }
        }
        @media (max-width: 520px) {
            .messages {
                padding-left: 10px;
                padding-right: 10px;
            }
            .message {
                column-gap: 8px;
                max-width: 90%;
            }
            .message.attachment-message {
                max-width: var(--attach-max, 94%);
            }
            .attachment-card {
                --attach-card-width: min(320px, 100%);
                min-width: 0;
                width: fit-content;
                max-width: 100%;
            }
            .attachment-card.media-attachment {
                --attach-card-width: min(var(--media-width, 320px), 100%);
                width: var(--attach-card-width);
            }
        }
        .message-avatar {
            align-items: center;
            background: #eaf2ec;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--accent-strong);
            display: inline-flex;
            font-size: 12px;
            font-weight: 800;
            height: 32px;
            justify-content: center;
            width: 32px;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        .avatar-stack {
            align-items: center;
            display: grid;
            gap: 6px;
            justify-items: center;
            position: sticky;
            top: 0;
            width: 40px;
            z-index: 1;
        }
        .message.mine .avatar-stack {
            grid-column: 2;
            order: 3;
        }
        .message.mine .message-main {
            grid-column: 1;
            order: 2;
        }
        .sender {
            align-items: center;
            color: var(--muted);
            display: flex;
            font-size: 11px;
            font-weight: 700;
            gap: 8px;
            margin-bottom: 4px;
            padding: 0 2px;
        }
        .bubble-time {
            color: var(--muted);
            font-size: 10px;
            line-height: 1.12;
            margin-top: 1px;
            text-align: center;
            white-space: pre-line;
            width: 40px;
        }
        /* ── Bubble ── */
        .bubble {
            background: var(--panel);
            border: 1.5px solid var(--line);
            border-radius: 12px;
            font-size: clamp(14px, 1.4vw, 15px);
            line-height: 1.5;
            overflow-wrap: anywhere;
            padding: 10px 14px;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
        }
        .message:not(.system) .bubble {
            min-width: var(--message-actions-min-width);
        }
        .message-main,
        .bubble,
        .message-footer {
            max-width: 100%;
            min-width: 0;
        }
        .message.mine .bubble {
            /* Bubble color comes from the sender's theme via JS messageColor(); no hardcoded override. */
        }
        .message.system .bubble {
            align-items: center;
            background: rgba(var(--accent-rgb, 21,111,90), 0.08);
            border: 1px solid rgba(var(--accent-rgb, 21,111,90), 0.14);
            border-radius: 999px;
            color: var(--accent-strong);
            display: inline-flex;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.4;
            max-width: min(560px, 92%);
            padding: 8px 14px;
            text-align: center;
        }
        .message.system .bubble::before,
        .message.system .bubble::after {
            display: none;
        }
        .message.recalled .bubble {
            border-style: dashed;
            opacity: 0.7;
        }
        .text {
            -webkit-user-select: text;
            user-select: text;
            white-space: pre-wrap;
        }
        .message:not(.system):not(.attachment-message) .bubble {
            -webkit-user-select: text;
            user-select: text;
        }
        .text.recalled { color: var(--muted); font-style: italic; }
        .recalled-actions { display: flex; justify-content: flex-end; margin-top: 6px; }
        .edit-recalled {
            background: rgba(255,255,255,0.82);
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--accent-strong);
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            min-height: 26px;
            overflow: hidden;
            padding: 4px 10px;
            -webkit-tap-highlight-color: transparent;
        }
        /* ── Attachments ── */
        .bubble-content {
            max-width: 100%;
            min-width: 0;
        }
        .message.attachment-message .bubble {
            overflow: hidden;
            padding: 0;
        }
        .message.attachment-message .bubble-content {
            display: grid;
            gap: 6px;
            justify-items: start;
            max-width: 100%;
            width: 100%;
        }
        .message.mine.attachment-message .bubble-content {
            justify-items: end;
        }
        .message.attachment-message:not(.mine) .bubble {
            align-self: flex-start;
            /* Bubble color comes from the sender's theme via JS messageColor(); no hardcoded override. */
        }
        .message.mine.attachment-message .bubble {
            /* Bubble color comes from the sender's theme via JS messageColor(); no hardcoded override. */
        }
        .attachment-card {
            display: grid;
            gap: 8px;
            max-width: 100%;
            min-width: min(220px, 100%);
            width: 100%;
        }
        .attachment-card.file-attachment,
        .attachment-card.audio-attachment {
            width: 100%;
        }
        .attachment-card.media-attachment {
            width: 100%;
        }
        .attachment-card.image-attachment {
            --media-aspect-ratio: 4 / 3;
        }
        .attachment-card.video-attachment {
            --media-aspect-ratio: 16 / 9;
        }
        .attachment-card.audio-attachment {
            gap: 10px;
        }
        .media-frame {
            background: rgba(255,255,255,0.66);
            border-radius: 10px;
            display: block;
            line-height: 0;
            overflow: hidden;
            position: relative;
        }
        .attachment-card.media-attachment .media-frame {
            aspect-ratio: var(--media-aspect-ratio, 16 / 9);
            width: 100%;
        }
        button.media-frame {
            border: 0;
            cursor: zoom-in;
            min-height: 0;
            max-width: 100%;
            padding: 0;
            text-align: left;
        }
        .media-preview {
            background: transparent;
            border-radius: 10px;
            display: block;
            height: 100%;
            object-fit: cover;
            width: 100%;
        }
        video.media-preview {
            background: #101915;
            object-fit: contain;
        }
        .audio-player {
            display: block;
            width: 100%;
        }
        .file-card {
            align-items: center;
            background: linear-gradient(180deg, rgba(255,255,255,0.48) 0%, rgba(255,255,255,0.22) 100%);
            border: 1px solid rgba(24, 33, 31, 0.08);
            border-radius: 8px;
            display: flex;
            gap: 12px;
            max-width: 100%;
            min-height: 64px;
            min-width: 0;
            padding: 10px 12px;
            text-align: left;
            text-decoration: none;
            transition: background 0.14s ease, border-color 0.14s ease, transform 0.14s ease;
            width: 100%;
        }
        a.file-card:hover,
        button.file-card:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.34) 100%);
            border-color: rgba(var(--accent-rgb, 21,111,90), 0.18);
        }
        a.file-card:focus-visible,
        button.file-card:focus-visible {
            outline: 2px solid rgba(var(--accent-rgb, 21,111,90), 0.22);
            outline-offset: 2px;
        }
        .file-details {
            display: grid;
            flex: 1 1 auto;
            gap: 4px;
            min-width: 0;
        }
        .file-icon {
            align-items: center;
            align-self: stretch;
            background: #fff1ed;
            border-radius: 10px;
            color: var(--danger);
            display: inline-flex;
            flex: 0 0 42px;
            font-size: 11px;
            font-weight: 900;
            justify-content: center;
            letter-spacing: 0.04em;
            min-height: 42px;
            width: 42px;
        }
        .file-name {
            color: var(--ink);
            display: -webkit-box;
            font-weight: 700;
            line-height: 1.3;
            max-height: calc(1.3em * 2);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .file-subtitle {
            color: var(--muted);
            display: block;
            font-size: 12px;
            line-height: 1.25;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .message-footer {
            align-items: center;
            display: flex;
            gap: 6px;
            justify-content: space-between;
            margin-top: 4px;
            min-height: 26px;
            padding: 0 2px;
            width: 100%;
        }
        .message-footer:has(.message-footer-meta):not(:has(.message-footer-actions)) {
            display: flex;
        }
        .message-footer:not(:has(.message-footer-meta)) {
            justify-content: flex-end;
        }
        .message.mine .message-footer:not(:has(.message-footer-meta)) {
            justify-content: flex-start;
        }
        .message-footer:has(.message-footer-meta) {
            flex-direction: row;
        }
        .message.mine .message-footer:has(.message-footer-meta) {
            flex-direction: row-reverse;
        }
        .message-footer-meta {
            color: var(--muted);
            flex: 1 1 auto;
            font-size: 11px;
            line-height: 1.3;
            min-width: 0;
            overflow: hidden;
            text-align: left;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .message-footer-meta.uploading {
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            color: transparent !important;
        }
        .message.mine .message-footer-meta {
            text-align: right;
        }
        .message-footer-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .bubble-action {
            align-items: center;
            background: var(--message-action-bg, rgba(255,255,255,0.82));
            border: 1px solid var(--message-action-border, var(--line));
            border-radius: 999px;
            color: var(--message-action-text, var(--accent-strong));
            cursor: pointer;
            display: inline-flex;
            height: 26px;
            justify-content: center;
            overflow: hidden;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            width: 26px;
        }
        .bubble-action svg { fill: none; height: 14px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; width: 14px; }
        .bubble-action.confirm-delete {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #b91c1c;
        }
        .bubble-action.copy-success {
            background: var(--message-action-bg, var(--wash));
            border-color: var(--message-action-border, var(--line));
            color: var(--message-action-text, var(--ok));
        }
        @media (hover: none), (pointer: coarse) {
            .message {
                max-width: min(560px, calc(100% - 74px));
            }
        }
        /* ── Scroll-to-bottom arrow ── */
        .scroll-arrow {
            background: var(--panel);
            border: 1px solid rgba(var(--accent-rgb, 21,111,90), 0.18);
            border-radius: 999px;
            bottom: 86px;
            bottom: calc(var(--composer-height, 74px) + 12px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 1px rgba(var(--accent-rgb, 21,111,90), 0.06);
            color: var(--accent);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 36px;
            width: 36px;
            opacity: 0;
            overflow: visible;
            pointer-events: none;
            position: absolute;
            left: 50%;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease, background 0.15s ease;
            transform: translate(-50%, 8px);
            white-space: nowrap;
            z-index: 5;
            font-size: 12px;
        }
        .scroll-arrow:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(var(--accent-rgb, 21,111,90), 0.3);
            color: #fff;
        }
        .scroll-arrow:active {
            transform: translate(-50%, 0) scale(0.94);
        }
        .scroll-arrow.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }
        .scroll-arrow svg { fill: none; height: 16px; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2; width: 16px; flex-shrink: 0; transition: stroke 0.15s ease; }
        .scroll-arrow-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent);
            border-radius: 999px;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
            min-width: 16px;
            padding: 2px 5px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(var(--accent-rgb, 21,111,90), 0.3);
        }
        .scroll-arrow-badge:empty { display: none; }
        .history-progress {
            bottom: calc(var(--composer-height, 74px) + 14px);
            opacity: 0;
            pointer-events: none;
            position: absolute;
            right: 7px;
            top: calc(var(--chat-head-height, 62px) + 12px);
            transition: opacity 0.18s ease;
            width: 3px;
            z-index: 3;
        }
        .history-progress.visible {
            opacity: 1;
        }
        .history-progress span {
            background: rgba(var(--accent-rgb, 21,111,90), 0.42);
            border-radius: 999px;
            display: block;
            min-height: 22px;
            transform: translateY(var(--history-progress-top, 0px));
            width: 100%;
        }
        /* ── Compose bar ── */
        .composer {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), #f3f7f2);
            border-top: 1px solid rgba(215, 222, 215, 0.92);
            box-shadow: 0 -10px 30px rgba(24, 33, 31, 0.06);
            bottom: 0;
            padding: 12px 14px 14px;
            padding-bottom: max(14px, env(safe-area-inset-bottom));
            position: sticky;
            z-index: 4;
        }
        .composer::before {
            background: linear-gradient(90deg, transparent, rgba(215, 222, 215, 0.95), transparent);
            content: '';
            height: 1px;
            left: 16px;
            position: absolute;
            right: 16px;
            top: 0;
        }
        .composer-shell {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(201, 212, 203, 0.95);
            border-radius: 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 8px 22px rgba(24, 33, 31, 0.03);
            padding: 6px;
        }
        .compose-row {
            align-items: center;
            display: grid;
            gap: 8px;
            grid-template-columns: 36px minmax(0,1fr) 36px;
        }
        textarea {
            background: linear-gradient(180deg, #f8fbf8, #ffffff);
            border: 1px solid #c9d6cd;
            border-radius: 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
            color: var(--ink);
            box-sizing: border-box;
            display: block;
            font: inherit;
            font-size: 15px;
            line-height: 20px;
            height: 36px;
            max-height: min(34vh, 168px);
            min-height: 36px;
            min-width: 0;
            overflow-y: auto;
            padding: 7px 12px;
            resize: none;
            scrollbar-width: none;
            touch-action: pan-y;
            width: 100%;
        }
        textarea::-webkit-scrollbar { display: none; }
        textarea::placeholder { color: #8b978e; }
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 21,111,90), 0.12), inset 0 1px 0 rgba(255,255,255,0.9);
            outline: none;
        }
        button { border: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font: inherit; -webkit-tap-highlight-color: transparent; }
        .file-label,
        .send-button {
            align-items: center;
            display: inline-flex;
            justify-content: center;
            border-radius: 999px;
            height: 36px;
            overflow: hidden;
            padding: 0;
            width: 36px;
        }
        .file-label {
            background: #eef4ef;
            border: 1px solid #cdd8cf;
            color: var(--accent-strong);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
        }
        .file-label:hover { background: #e2ece4; }
        .file-label:active {
            background: #dce9df;
            border-radius: 999px;
            box-shadow: inset 0 1px 2px rgba(24,33,31,0.12);
            transform: scale(0.94);
        }
        .file-label:focus-within {
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 21,111,90), 0.14), inset 0 1px 0 rgba(255,255,255,0.75);
            outline: none;
        }
        .file-label svg,
        .send-button svg { fill: none; height: 17px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; width: 17px; }
        .send-button {
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            box-shadow: 0 10px 20px rgba(var(--accent-rgb, 21,111,90), 0.24);
            color: white;
        }
        .send-button:hover:not(:disabled) {
            filter: brightness(1.03);
        }
        button:disabled { cursor: default; opacity: 0.6; }
        /* ── Right panel ── */
        .side {
            align-self: start;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            display: grid;
            gap: 14px;
            max-height: calc(100vh - 32px);
            overflow: auto;
            padding: 16px;
        }
        .side-section-head {
            align-items: center;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .side-section-head h1,
        .side-section-head h2 { font-size: 14px; font-weight: 700; }
        .side-note { color: var(--muted); font-size: 12px; line-height: 1.5; overflow-wrap: anywhere; }
        .side-actions {
            display: flex;
            gap: 6px;
        }
        .side-btn {
            align-items: center;
            background: var(--wash);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--ink);
            cursor: pointer;
            display: inline-flex;
            font-size: 12px;
            font-weight: 700;
            gap: 5px;
            height: 34px;
            justify-content: center;
            overflow: hidden;
            padding: 0 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .side-btn:hover { background: #ddeade; }
        .side-btn.danger { background: #fff0ed; border-color: #f5c6c0; color: var(--danger); }
        .side-btn.danger:hover { background: #fde1dc; }
        /* ── QR frame ── */
        .qr-frame {
            background: #f8faf6;
            border: 1px solid var(--line);
            border-radius: 10px;
            display: grid;
            gap: 8px;
            justify-items: center;
            padding: 12px;
        }
        .qr { background: white; border: 1px solid var(--line); border-radius: 8px; display: block; image-rendering: pixelated; max-width: 220px; padding: 8px; width: 100%; }
        /* URL input */
        .url-row { display: flex; gap: 8px; align-items: center; }
        .url-row input { flex: 1; min-width: 0; }
        input {
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--ink);
            font: inherit;
            font-size: 13px;
            padding: 9px 11px;
            width: 100%;
        }
        input:focus { border-color: var(--accent); outline: none; }
        /* ── Session collapsible QR ── */
        .session-collapsible { display: grid; gap: 8px; }
        .session-collapsible.collapsed { display: none; }
        .session-toggle {
            background: var(--wash);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--accent-strong);
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 12px;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.14s ease;
        }
        .session-toggle:hover { background: #ddeade; }
        /* divider */
        .side-divider { border: 0; border-top: 1px solid var(--line); }
        /* ── Backdrops ── */
        .session-backdrop { display: none; }
        .session-backdrop.open {
            background: rgba(15,23,42,0.42);
            display: grid;
            inset: 0;
            padding: 22px;
            place-items: center;
            position: fixed;
            z-index: 20;
        }
        .session-backdrop.open .side {
            align-self: center;
            max-height: calc(100vh - 44px);
            width: min(340px, calc(100vw - 44px));
        }
        .preview-backdrop { display: none; }
        .preview-backdrop.open {
            background: rgba(15,23,42,0.78);
            display: grid;
            inset: 0;
            padding: 22px;
            place-items: center;
            position: fixed;
            touch-action: none;
            z-index: 30;
        }
        .preview-box {
            box-sizing: border-box;
            display: grid;
            height: calc(100vh - 44px);
            max-height: calc(100vh - 44px);
            max-width: calc(100vw - 44px);
            place-items: center;
            padding-right: 56px;
            position: relative;
            width: calc(100vw - 44px);
        }
        .preview-toolbar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: absolute;
            right: 12px;
            top: 12px;
        }
        .preview-toolbar button {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(225, 233, 227, 0.95);
            border-radius: 999px;
            color: var(--ink);
            display: inline-flex;
            height: 38px;
            justify-content: center;
            overflow: hidden;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            width: 38px;
        }
        .preview-toolbar button svg {
            fill: none;
            height: 16px;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2;
            width: 16px;
        }
        .preview-image {
            background: #020617;
            border-radius: 10px;
            max-height: calc(100vh - 96px);
            max-width: calc(100vw - 108px);
            object-fit: contain;
            touch-action: none;
            transform-origin: center center;
            user-select: none;
            cursor: grab;
            will-change: transform;
        }
        .preview-image.dragging {
            cursor: grabbing;
        }
        .hidden { display: none; }
        .composer-context-menu {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 14px 34px rgba(24, 33, 31, 0.18);
            display: grid;
            gap: 2px;
            min-width: 150px;
            padding: 6px;
            position: fixed;
            z-index: 40;
        }
        .composer-context-menu button {
            background: transparent;
            border: 0;
            border-radius: 6px;
            color: var(--ink);
            cursor: pointer;
            display: block;
            font: inherit;
            padding: 8px 10px;
            text-align: left;
            width: 100%;
        }
        .composer-context-menu button:hover:not(:disabled),
        .composer-context-menu button:focus-visible:not(:disabled) {
            background: var(--wash);
            outline: none;
        }
        .composer-context-menu button:disabled {
            color: var(--muted);
            cursor: default;
            opacity: 0.58;
        }
        .viewport-debug {
            background: rgba(2, 6, 23, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            bottom: 8px;
            color: #f8fafc;
            cursor: move;
            display: none;
            font: 11px/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
            left: 8px;
            max-height: min(46vh, 260px);
            max-width: min(420px, calc(100vw - 16px));
            overflow: auto;
            padding: 8px;
            position: fixed;
            touch-action: none;
            user-select: none;
            white-space: pre-wrap;
            z-index: 60;
        }
        .viewport-debug.open {
            display: block;
        }
        /* ── Mobile ── */
        @media (max-width: 820px) {
            .device-detail-name-input {
                font-size: 16px;
            }
            html,
            body {
                height: 100%;
                min-height: 100%;
                overflow: hidden;
                width: 100%;
            }
            .chat-viewport {
                background: var(--bg);
                height: var(--chat-viewport-height);
                left: var(--chat-viewport-left);
                max-height: var(--chat-viewport-height);
                overflow: hidden;
                position: fixed;
                top: var(--chat-viewport-top);
                width: var(--chat-viewport-width);
                z-index: 0;
            }
            main {
                display: grid;
                gap: 0;
                height: 100%;
                max-height: 100%;
                min-height: 0;
                overflow: hidden;
                padding: calc(8px + env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom));
                width: 100%;
            }
            .chat-shell {
                border-radius: 14px;
                height: 100%;
            }
            .chat-head { position: sticky; top: 0; z-index: 2; }
            .messages {
                --messages-bottom-space: 16px;
                gap: 12px;
                padding: 12px 12px var(--messages-bottom-space);
            }
            .composer { padding: 9px 10px 11px; padding-bottom: max(11px, env(safe-area-inset-bottom)); }
            .composer-shell { padding: 6px; }
            .compose-row { column-gap: 6px; grid-template-columns: 36px minmax(0,1fr) 36px; }
            input,
            textarea {
                font-size: 16px;
            }
            textarea {
                height: 38px;
                line-height: 22px;
                max-height: min(30vh, 140px);
                min-height: 38px;
                padding: 7px 12px;
            }
            .file-label,
            .send-button { height: 38px; width: 38px; }
            .scroll-arrow {
                bottom: calc(var(--composer-height, 58px) + 12px);
            }
            .history-progress {
                right: 5px;
            }
            .device-panel,
            .lang-panel {
                right: 0;
                max-height: calc(var(--chat-viewport-height, 100dvh) - var(--composer-height, 58px) - 64px);
                overflow-y: auto;
                overflow-x: hidden;
                z-index: 999;
            }
            .device-panel.editing {
                position: fixed !important;
                top: calc(var(--chat-viewport-top, 0px) + var(--chat-viewport-height, 100dvh) / 2) !important;
                left: calc(var(--chat-viewport-left, 0px) + var(--chat-viewport-width, 100vw) / 2) !important;
                transform: translate(-50%, -50%) !important;
                right: auto !important;
                width: 90% !important;
                max-width: 320px !important;
                max-height: calc(var(--chat-viewport-height, 100dvh) - 32px) !important;
                box-shadow: 0 20px 40px rgba(15, 23, 42, 0.24) !important;
                z-index: 1001 !important;
                overflow: hidden !important;
            }
            .side { display: none; }
            .mobile-close-action { display: inline-flex; }
            .bubble { font-size: clamp(14px, 3.7vw, 16px); }
            .message {
                column-gap: 6px;
                grid-template-columns: 40px minmax(0, 1fr);
                max-width: min(560px, calc(100% - 74px));
            }
            .message.mine {
                grid-template-columns: minmax(0, 1fr) 40px;
            }
            :root { --attach-max: min(560px, calc(100% - 74px)); }
            .message.attachment-message { max-width: var(--attach-max); }
            .attachment-card {
                --attach-card-width: min(320px, 100%);
                min-width: 0;
                width: var(--attach-card-width);
                max-width: 100%;
            }
            .attachment-card.media-attachment {
                --attach-card-width: min(var(--media-width, 320px), 100%);
                min-width: 0;
            }
            html.embedded-chat .messages {
                padding-left: 10px;
                padding-right: 10px;
            }
            .session-backdrop.open {
                background: rgba(15,23,42,0.42);
                display: grid;
                inset: 0;
                padding: 18px;
                place-items: center;
                position: fixed;
                z-index: 20;
            }
            .session-backdrop.open .side {
                display: grid;
                max-height: calc(100vh - 36px);
                overflow: auto;
                width: min(360px, 100%);
            }
        }
        @media (max-width: 480px) {
            .chat-head { gap: 8px; padding-left: 10px; padding-right: 10px; }
            .chat-head-title { gap: 6px; }
            .chat-head-title h1 { font-size: 15px; }
            .head-actions { gap: 5px; }
            .device-pill { padding: 0 8px; gap: 5px; height: 34px; }
            .limit-status-pill { padding: 0 8px; gap: 4px; height: 34px; font-size: 12px; }
            .icon-button { width: 34px; height: 34px; border-radius: 6px; }
            .icon-button svg { height: 16px; width: 16px; }
        }

        /* ── Limit Status Pill & Pay Modal ── */
        .limit-status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            height: 36px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
            background: rgba(21, 111, 90, 0.08);
            color: var(--accent);
            border: 1px solid rgba(21, 111, 90, 0.16);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .limit-status-pill:hover {
            background: rgba(21, 111, 90, 0.14);
        }
        .limit-status-pill.warning {
            background: rgba(217, 119, 6, 0.08);
            color: #d97706;
            border-color: rgba(217, 119, 6, 0.16);
        }
        .limit-status-pill.warning:hover {
            background: rgba(217, 119, 6, 0.14);
        }
        .limit-status-pill.danger {
            background: rgba(220, 38, 38, 0.08);
            color: #dc2626;
            border-color: rgba(220, 38, 38, 0.16);
            animation: pulse-limit 2.5s infinite;
        }
        .limit-status-pill.danger:hover {
            background: rgba(220, 38, 38, 0.14);
        }
        .limit-status-pill.paid {
            background: rgba(16, 185, 129, 0.08);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.16);
        }
        .limit-status-pill.paid:hover {
            background: rgba(16, 185, 129, 0.14);
        }
        .limit-status-pill .pill-icon {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        @keyframes pulse-limit {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .pay-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(24, 33, 31, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .pay-modal-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }
        .pay-modal {
            background: #ffffff;
            border: 1px solid rgba(215, 222, 215, 0.6);
            border-radius: 20px;
            width: 90%;
            max-width: 440px;
            padding: 32px;
            position: relative;
            box-shadow: 0 24px 60px rgba(24, 33, 31, 0.2);
            transform: translateY(20px) scale(0.96);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            color: var(--ink);
            font-family: inherit;
        }
        .pay-modal-backdrop.open .pay-modal {
            transform: translateY(0) scale(1);
        }
        .pay-modal-glow {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(21, 111, 90, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }
        .pay-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: 0;
            cursor: pointer;
            color: var(--muted);
            padding: 6px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            z-index: 10;
        }
        .pay-modal-close:hover {
            background: var(--wash);
            color: var(--ink);
        }
        .pay-modal-close svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
        }
        .pay-modal-header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        .pay-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--accent);
            background: rgba(21, 111, 90, 0.08);
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
        }
        .pay-modal-header h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-strong);
            margin-bottom: 10px;
        }
        .pay-modal-header p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
        }
        .pay-modal-pricing {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .pay-modal-pricing .price-value {
            font-size: 44px;
            font-weight: 900;
            color: var(--ink);
            letter-spacing: -0.02em;
        }
        .pay-modal-pricing .price-period {
            font-size: 16px;
            color: var(--muted);
            font-weight: 600;
        }
        .pay-features {
            display: grid;
            gap: 12px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--ink);
            font-weight: 500;
        }
        .feature-item svg {
            width: 16px;
            height: 16px;
            stroke: #22c55e;
            stroke-width: 3;
            fill: none;
            flex-shrink: 0;
        }
        .pay-modal-actions {
            position: relative;
            z-index: 1;
        }
        .pay-btn-primary {
            width: 100%;
            background: var(--accent);
            color: #ffffff;
            border: 0;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 12px rgba(21, 111, 90, 0.24);
        }
        .pay-btn-primary:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }
        .pay-btn-primary:active {
            transform: translateY(1px);
        }
        .pay-btn-primary .shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            animation: shimmer-anim 3s infinite;
        }
        @keyframes shimmer-anim {
            0% { left: -100%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }
        .pay-modal-hint {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            margin-top: 12px;
        }

<body>
    <div class="chat-viewport" id="chat-viewport">
        <main>
            <section class="chat-shell">
            <header class="chat-head offline" id="chat-head">
                <div class="chat-head-title">
                    <img class="chat-logo" src="/assets/eqt-logo-mark.png" alt="EQT logo">
                    <div class="chat-title-container">
                        <h1 id="chat-title-text">EQT{{if .LicenseTier}}<span class="license-badge" id="chat-license-badge">{{.LicenseTier}}</span>{{end}}</h1>
                    </div>
                </div>
                <div class="head-actions">
                    <div class="limit-status-pill" id="limit-status-pill" style="display: none;" title="点击查看订阅详情">
                        <span id="limit-status-text">5:00</span>
                    </div>
                    <button class="device-pill" type="button" id="devices-toggle" title="Show connected devices" aria-label="Show connected devices" aria-expanded="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2"></rect><path d="M8 20h8"></path><path d="M12 16v4"></path></svg>
                        <span id="device-count">0</span>
                    </button>
                    <button class="icon-button" type="button" id="share-session" title="Show session QR" aria-label="Show session QR">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4z"></path><path d="M14 4h6v6h-6z"></path><path d="M4 14h6v6H4z"></path><path d="M14 14h2v2h-2z"></path><path d="M18 14h2v6h-4v-2h2z"></path><path d="M14 18h2v2h-2z"></path></svg>
                    </button>
                    {{if .CanStop}}<form class="head-stop-form" method="post" action="{{.StopRoute}}">
                        <input type="hidden" name="hostToken" value="{{.HostToken}}">
                        <button class="icon-button danger" type="submit" title="Stop chat" aria-label="Stop chat">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                        </button>
                    </form>{{end}}
                    <button class="icon-button mobile-close-action" type="button" id="close-page" title="Close" aria-label="Close">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                    </button>
                    <button class="icon-button" type="button" id="lang-toggle" title="Switch language" aria-label="Switch language">
                        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                    </button>
                    <div class="device-panel" id="device-panel">
                        <div class="device-panel-title">Online devices</div>
                        <div class="device-roster" id="device-roster"></div>
                    </div>
                    <div class="license-panel" id="license-panel"></div>
                    <div class="lang-panel" id="lang-panel">
                        <div class="lang-panel-title">Language</div>
                        <div class="lang-list" id="lang-list"></div>
                    </div>
                </div>
            </header>
            <div class="messages" id="messages" aria-live="polite"></div>
            <div class="history-progress" id="history-progress" aria-hidden="true"><span id="history-progress-thumb"></span></div>
            <button class="scroll-arrow" id="scroll-arrow" aria-label="Jump to latest message" title="Latest message">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="m5 16 7 6 7-6"/></svg>
                <span class="scroll-arrow-badge" id="scroll-arrow-badge"></span>
            </button>
            <form class="composer" id="composer">
                <div class="composer-shell">
                    <div class="compose-row">
                        <label class="file-label" for="file-input" title="Add attachment" aria-label="Add attachment">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 12.5 14.5 6a3 3 0 0 1 4.2 4.2L10.8 18.1a5 5 0 1 1-7.1-7.1l8.7-8.7"></path></svg>
                        </label>
                        <textarea id="message-text" rows="1" placeholder="Message" autocomplete="off"></textarea>
                        <button class="send-button" id="send-button" type="submit" aria-label="Send" disabled>
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 12 16-8-5 16-3-7-8-1z"></path></svg>
                        </button>
                    </div>
                </div>
                <input id="file-input" class="hidden" type="file" multiple>
            </form>
            </section>
            <div class="session-backdrop" id="session-backdrop">
            <aside class="side" id="session-panel">
                <div class="side-section-head">
                    <h1>QR</h1>
                    <button class="icon-button" type="button" id="close-session" title="Close" aria-label="Close session panel">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                    </button>
                </div>
                <p class="side-note" id="chat-scan-note">Scan this code to join from another device.</p>
                <div class="qr-frame">
                    <img class="qr" src="{{.QRImageRoute}}" alt="Chat QR code">
                </div>
                <div class="session-collapsible collapsed" id="session-collapsible">
                    <div class="url-row">
                        <input id="chat-url" value="{{.URL}}" readonly>
                        <button class="side-btn" type="button" id="copy-url">Copy</button>
                    </div>
                </div>
                <button class="session-toggle" type="button" id="session-toggle" aria-expanded="true">Show URL</button>
            </aside>
            </div>
            <div class="preview-backdrop" id="preview-backdrop">
            <div class="preview-box">
                <img class="preview-image" id="preview-image" alt="Image preview">
                <div class="preview-toolbar">
                    <button type="button" id="preview-zoom-out" title="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path></svg></button>
                    <button type="button" id="preview-zoom-in" title="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg></button>
                    <button type="button" id="preview-copy" title="Copy image" aria-label="Copy image"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    <button type="button" id="preview-close" title="Close" aria-label="Close"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button>
                </div>
            </div>
            </div>
        </main>

        function withAfterSeq(route) {

                '&joinSeq=' + encodeURIComponent(String(hasJoinSeq ? joinSeq : eventCursorSeq));

        function withClientToken(route) {
            var sep = route.indexOf('?') === -1 ? '?' : '&';
            return route + sep + 'token=' + encodeURIComponent(state.token);
        }
        function withClientPeer(route) {
            var peer = currentPeer();
            if (!peer) { return route; }
            var sep = route.indexOf('?') === -1 ? '?' : '&';
            return route + sep + 'peer=' + encodeURIComponent(peer);
        }
        function withClientTheme(route) {
            if (!validThemeID(state.theme)) { return route; }
            var sep = route.indexOf('?') === -1 ? '?' : '&';
            return route + sep + 'theme=' + encodeURIComponent(state.theme);
        }
        function withClientAvatar(route) {
            if (!state.avatar) { return route; }
            var sep = route.indexOf('?') === -1 ? '?' : '&';
            return route + sep + 'avatar=' + encodeURIComponent(state.avatar);
        }
        function withClientJoin(route) {
            if (!joinToken) { return route; }
            var sep = route.indexOf('?') === -1 ? '?' : '&';
            return route + sep + 'join=' + encodeURIComponent(joinToken);
        }

        function connectSSE() {
            if (events) { events.close(); events = null; }
            var route = withClientJoin(withClientAvatar(withClientTheme(withClientPeer(withClientToken(eventCursorSeq > 0 ? withAfterSeq('{{.EventsRoute}}') : '{{.EventsRoute}}')))));
            route += (route.indexOf('?') === -1 ? '?' : '&') + 'label=' + encodeURIComponent(state.sender);
            events = new EventSource(route);
            events.onopen = function() {
                reconnectDelay = 1000;
                if (chatConnectionLost) {
                    chatConnectionLost = false;
                    showSystemNotice('Connection restored.');
                }
                lastMessageTimestamp = Date.now();
                setConnectionState(true, 'Connected as ' + state.sender + '.');
                refreshChatStatus().catch(function() {});
            };
            events.onmessage = function(event) {
                updateEventCursor(event.lastEventId);
                mergeMessages(JSON.parse(event.data) || []);
                lastMessageTimestamp = Date.now();
                var messages = JSON.parse(event.data) || [];
                var hasSystem = messages.some(function(m) { return m && m.type === 'system'; });
                if (hasSystem) {
                    refreshChatStatus().catch(function() {});
                }
            };
            events.onerror = function() {
                if (!chatConnectionLost) {
                    chatConnectionLost = true;
                    showSystemNotice('Connection lost. Reconnecting...');
                }
                setConnectionState(false, 'Disconnected. Reconnecting...');
                if (events) { events.close(); events = null; }
                if (isPageVisible) { scheduleReconnect(); }
            };
        }
        function scheduleReconnect() {
            if (reconnectTimer) { clearTimeout(reconnectTimer); }
            reconnectTimer = setTimeout(function() {
                if (isPageVisible) {
                    connectSSE();
                    reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
                }
            }, reconnectDelay);
        }

            refreshChatStatus()

                .then(function() {
