                            <div class="shimmer"></div>
                        </button>
                        <p class="pay-modal-hint">${dict.hint}</p>
                    </div>
                </div>
            `;
            
            // Re-bind actions to new elements
            document.getElementById('pay-modal-close').addEventListener('click', function() {
                document.getElementById('pay-modal-backdrop').classList.remove('open');
            });
            
            document.getElementById('subscribe-button').addEventListener('click', function() {
                var btn = this;
                if (btn.disabled) return;
                btn.disabled = true;
                var textSpan = btn.querySelector('span');
                textSpan.textContent = dict.subscribeProgress;
                
                var payURL = withClientJoin(withClientAvatar(withClientTheme(withClientPeer(withClientToken('{{.PayRoute}}')))));
                fetch(payURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pay: true })
                })
                .then(function(r) {
                    if (!r.ok) {
                        throw new Error('Payment failed');
                    }
                    return r.json();
                })
                .then(function(data) {
                    btn.disabled = false;
                    textSpan.textContent = dict.subscribeSuccess;
                    setTimeout(function() {
                        textSpan.textContent = dict.subscribeBtn;
                        updateLimitUI(data);
                    }, 1500);
                })
                .catch(function(err) {
                    btn.disabled = false;
                    textSpan.textContent = dict.subscribeFail;
                    setTimeout(function() {
                        textSpan.textContent = dict.subscribeBtn;
                    }, 2000);
                });
            });
        }

        function updateLimitUI(data) {
            if (!data) return;
            var usedSeconds = data.usedSeconds || 0;
            var isPaid = !!data.isPaid;
            var clockTampered = !!data.clockTampered;
            limitState.usedSeconds = usedSeconds;
            limitState.isPaid = isPaid;
            limitState.clockTampered = clockTampered;
            limitState.licenseTier = data.licenseTier || '{{.LicenseTier}}' || '';

            var pill = document.getElementById('limit-status-pill');
            var pillText = document.getElementById('limit-status-text');
            var currentTier = data.licenseTier || '{{.LicenseTier}}' || '';

            // Clean up license badge in title first in case it was there
            var badge = document.getElementById('chat-license-badge');
            if (badge) {
                badge.remove();
            }

            if (clockTampered) {
                pill.style.display = 'inline-flex';
                pill.className = 'limit-status-pill danger';
                pill.setAttribute('title', dict.clockErrorHint);
                
                if (currentTier && currentTier !== 'PAID') {
                    pillText.textContent = currentTier;
                } else {
                    pillText.textContent = dict.clockError;
                }
                
                if (currentTier && currentTier !== 'PAID') {
                    var titleText = document.getElementById('chat-title-text');
                    if (titleText) {
                        var newBadge = document.createElement('span');
                        newBadge.className = 'license-badge clock-error';
                        newBadge.id = 'chat-license-badge';
                        newBadge.textContent = currentTier;
                        newBadge.setAttribute('title', dict.clockErrorHint);
                        newBadge.addEventListener('click', function(e) {
                            e.stopPropagation();
                            toggleLicensePanel(e);
                        });
                        titleText.appendChild(newBadge);
                    }
                }
                
                textEl.disabled = true;
                fileEl.disabled = true;
                textEl.placeholder = dict.clockError;
                
                // Show description inside pay-modal as clock error description if opened
                var payDesc = document.querySelector('.pay-modal-header p');
                if (payDesc) {
                    payDesc.textContent = dict.clockErrorHint;
                }
                var payTitle = document.querySelector('.pay-modal-header h2');
                if (payTitle) {
                    payTitle.textContent = dict.clockError;
                }
                
                // Refresh floating diagnostic card if active
                if (licensePanel && licensePanel.classList.contains('open')) {
                    updateLicensePanelUI();
                }
                return;
            }
            
            // Restore normal descriptions inside pay-modal
            var payDesc = document.querySelector('.pay-modal-header p');
            if (payDesc) {
                payDesc.textContent = dict.description;
            }
            var payTitle = document.querySelector('.pay-modal-header h2');
            if (payTitle) {
                payTitle.textContent = dict.title;
            }

            pill.setAttribute('title', dict.titleAttr);
            
            if (isPaid) {
                pill.style.display = 'none';
                pill.className = 'limit-status-pill paid';
                
                var displayTier = currentTier || 'PAID';
                pillText.textContent = displayTier;
                
                var titleText = document.getElementById('chat-title-text');
                if (titleText) {
                    var newBadge = document.createElement('span');
                    newBadge.className = 'license-badge';
                    newBadge.id = 'chat-license-badge';
                    newBadge.textContent = displayTier;
                    newBadge.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleLicensePanel(e);
                    });
                    titleText.appendChild(newBadge);
                }
                
                textEl.disabled = false;
                fileEl.disabled = false;
                textEl.placeholder = dict.messagePlaceholder;
                document.getElementById('pay-modal-backdrop').classList.remove('open');
            } else {
                // isPaid is false
                if (currentTier && currentTier !== 'FREE') {
                    // Paid tier exists on server but isPaid is false -> Inconsistency state (Expired or Unsynced)
                    pill.style.display = 'inline-flex';
                    pill.className = 'limit-status-pill danger'; // Red pill!
                    pillText.textContent = currentTier;
                    
                    var titleText = document.getElementById('chat-title-text');
                    if (titleText) {
                        var newBadge = document.createElement('span');
                        newBadge.className = 'license-badge clock-error'; // Red badge!
                        newBadge.id = 'chat-license-badge';
                        newBadge.textContent = currentTier;
                        newBadge.addEventListener('click', function(e) {
                            e.stopPropagation();
                            toggleLicensePanel(e);
                        });
                        titleText.appendChild(newBadge);
                    }
                    textEl.disabled = false;
                    fileEl.disabled = false;
                    textEl.placeholder = dict.messagePlaceholder;
                } else {
                    pill.style.display = 'inline-flex';
                    var remaining = Math.max(0, 300 - usedSeconds);
                    var mins = Math.floor(remaining / 60);
                    var secs = remaining % 60;
                    var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
                    
                    textEl.placeholder = dict.messagePlaceholder;
                    textEl.disabled = false;
                    fileEl.disabled = false;
                    if (remaining <= 0) {
                        pill.className = 'limit-status-pill danger';
                        pillText.textContent = dict.limitReached;
                    } else {
                        pillText.textContent = timeStr;
                        if (remaining <= 60) {
                            pill.className = 'limit-status-pill warning';
                        } else {
                            pill.className = 'limit-status-pill';
                        }
                    }
                }
            }

            if (licensePanel && licensePanel.classList.contains('open')) {
                updateLicensePanelUI();
            }
        }

        // Initialize dynamic i18n DOM
        initPayModalDOM();

        // 定时器模拟时间流逝（每秒）
        setInterval(function() {
            if (isPageVisible && events && events.readyState === EventSource.OPEN && !limitState.isPaid && !limitState.clockTampered) {
                if (limitState.usedSeconds < 300) {
                    limitState.usedSeconds++;
                    updateLimitUI(limitState);
                }
            }
        }, 1000);

        function updateLicensePanelUI() {
            var panel = document.getElementById('license-panel');
            if (!panel) return;

            var currentTier = limitState.licenseTier || '{{.LicenseTier}}' || '';
            var displayTier = currentTier || 'FREE';
            
            var statusStr = '';
            var statusClass = '';
            var detailsHtml = '';

            if (limitState.clockTampered) {
                statusStr = dict.lockedStatus;
                statusClass = 'danger';
                
                detailsHtml = `
                    <div class="license-info-row">
                        <strong>${dict.tierLabel}:</strong>
                        <span>${displayTier}</span>
                    </div>
                    <div class="license-info-row">
                        <strong>${dict.reasonLabel}:</strong>
                        <span class="text-danger">${dict.clockRollbackReason}</span>
                    </div>
                    <div class="license-info-row flex-column">
                        <strong>${dict.howToRestore}:</strong>
                        <p class="license-solution-text">${dict.clockRollbackSolution}</p>
                    </div>
                `;
            } else if (limitState.isPaid) {
                statusStr = dict.activeStatus;
                statusClass = 'success';
                
                detailsHtml = `
                    <div class="license-info-row">
                        <strong>${dict.tierLabel}:</strong>
                        <span class="text-success font-bold">${displayTier}</span>
                    </div>
                    <div class="license-info-row">
                        <strong>${dict.chatDuration}:</strong>
                        <span>${dict.unlimited}</span>
                    </div>
                    <div class="license-info-row">
                        <strong>${dict.fileTransfers}:</strong>
                        <span>${dict.unlimited}</span>
                    </div>
                `;
            } else {
                if (currentTier && currentTier !== 'FREE') {
                    // Expired or unsynced inconsistency state
                    statusStr = dict.licenseInactiveOrExpired;
                    statusClass = 'danger';
                    
                    detailsHtml = `
                        <div class="license-info-row">
                            <strong>${dict.tierLabel}:</strong>
                            <span>${displayTier}</span>
                        </div>
                        <div class="license-info-row">
                            <strong>${dict.reasonLabel}:</strong>
                            <span class="text-danger">${dict.serverInconsistentReason}</span>
                        </div>
                        <div class="license-info-row flex-column">
                            <strong>${dict.howToRestore}:</strong>
                            <p class="license-solution-text">${dict.serverInconsistentSolution}</p>
                        </div>
                    `;
                } else {
                    var remaining = Math.max(0, 300 - limitState.usedSeconds);
                    var mins = Math.floor(remaining / 60);
                    var secs = remaining % 60;
                    var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;

                    if (remaining <= 0) {
                        statusStr = dict.limitStatus;
                        statusClass = 'danger';
                    } else {
                        statusStr = dict.freeStatus;
                        statusClass = 'warning';
                    }

                    detailsHtml = `
                        <div class="license-info-row">
                            <strong>${dict.tierLabel}:</strong>
                            <span>FREE</span>
                        </div>
                        <div class="license-info-row">
                            <strong>${dict.remainingFreeTime}:</strong>
                            <span>${timeStr}</span>
                        </div>
                        <div class="license-info-row">
                            <strong>${dict.limitDetailsText}:</strong>
                            <span>${dict.limitDetailsVal}</span>
                        </div>
                    `;
                }
            }

            panel.innerHTML = `
                <div class="license-panel-title">${dict.licensePanelTitle}</div>
                <div class="license-status-badge ${statusClass}">${statusStr}</div>
                <div class="license-details-box">${detailsHtml}</div>
            `;
        }

        function toggleLicensePanel(event) {
            if (event) { event.stopPropagation(); }
            closeDevicePanel();
            var open = !licensePanel.classList.contains('open');
            licensePanel.classList.toggle('open', open);
            if (open) {
                updateLicensePanelUI();
            }
        }

        function closeLicensePanel() {
            if (licensePanel) {
                licensePanel.classList.remove('open');
            }
        }

        // 绑定事件
        document.getElementById('limit-status-pill').addEventListener('click', toggleLicensePanel);
        document.getElementById('pay-modal-backdrop').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('open');
            }
        });

        // 验收测试沙箱控制面板注入
        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('sandbox') || urlParams.has('debug')) {
            injectSandboxConsole();
        }

        function injectSandboxConsole() {
            var style = document.createElement('style');
            style.textContent = `
                .acceptance-sandbox {
                    position: fixed;
                    bottom: 20px;
                    right: 20px;
                    background: rgba(255, 255, 255, 0.98);
                    border: 1px solid var(--accent);
                    border-radius: 12px;
                    box-shadow: 0 12px 32px rgba(24, 33, 31, 0.25);
                    padding: 12px;
                    z-index: 999999;
                    font-family: inherit;
                    font-size: 12px;
                    width: 240px;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    backdrop-filter: blur(8px);
                    border-left: 4px solid var(--accent);
                }
                .acceptance-sandbox-title {
                    font-weight: 800;
                    color: var(--accent-strong);
                    border-bottom: 1px solid var(--line);
                    padding-bottom: 6px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }
                .acceptance-sandbox-close {
                    cursor: pointer;
                    color: var(--danger);
                    font-size: 16px;
                    font-weight: bold;
                    padding: 0 4px;
                }
                .acceptance-sandbox button {
                    background: var(--wash);
                    border: 1px solid var(--line);
                    border-radius: 6px;
                    padding: 6px 10px;
                    cursor: pointer;
                    text-align: left;
                    font-weight: 600;
                    color: var(--ink);
                    transition: all 0.15s;
                    font-size: 11px;
                }
                .acceptance-sandbox button:hover {
                    background: var(--accent);
                    color: #fff;
                    border-color: var(--accent);
                }
                .acceptance-sandbox button.active {
                    background: var(--accent-strong);
                    color: #fff;
                    border-color: var(--accent-strong);
                }
            `;
            document.head.appendChild(style);

            var container = document.createElement('div');
            container.className = 'acceptance-sandbox';
            container.id = 'acceptance-sandbox';
            document.body.appendChild(container);
            
            window.renderSandboxConsoleUI = function() {
                container.innerHTML = `
                    <div class="acceptance-sandbox-title">
                        <span>🛠️ ${dict.sandboxTitle}</span>
                        <span class="acceptance-sandbox-close" id="sandbox-close-btn" title="${dict.hide}">×</span>
                    </div>
                    <button data-status="premium_active">🟢 PLUS U ${dict.sandboxPaidActive}</button>
                    <button data-status="inconsistent_unpaid">🔴 PLUS U ${dict.sandboxUnpaidInconsistent}</button>
                    <button data-status="clock_tampered">🔴 PLUS U ${dict.sandboxClockLocked}</button>
                    <button data-status="free_quota">⚪ ${dict.sandboxFreeQuota}</button>
                    <button data-status="free_exceeded">🔴 ${dict.sandboxFreeExceeded}</button>
                `;
                
                document.getElementById('sandbox-close-btn').addEventListener('click', function() {
                    container.style.display = 'none';
                });
                
                var buttons = container.querySelectorAll('button');
                buttons.forEach(function(btn) {
                    var status = btn.getAttribute('data-status');
                    if (window.currentAcceptanceStatus === status) {
                        btn.classList.add('active');
                    }
                    btn.addEventListener('click', function() {
                        buttons.forEach(function(b) { b.classList.remove('active'); });
                        btn.classList.add('active');
                        window.currentAcceptanceStatus = status;
                        
                        var mockState = {};
                        if (status === 'premium_active') {
                            mockState = { usedSeconds: 120, isPaid: true, clockTampered: false, licenseTier: 'PLUS U' };
                        } else if (status === 'inconsistent_unpaid') {
                            mockState = { usedSeconds: 300, isPaid: false, clockTampered: false, licenseTier: 'PLUS U' };
                        } else if (status === 'clock_tampered') {
                            mockState = { usedSeconds: 300, isPaid: false, clockTampered: true, licenseTier: 'PLUS U' };
                        } else if (status === 'free_quota') {
                            mockState = { usedSeconds: 120, isPaid: false, clockTampered: false, licenseTier: '' };
                        } else if (status === 'free_exceeded') {
                            mockState = { usedSeconds: 300, isPaid: false, clockTampered: false, licenseTier: '' };
                        }
                        
                        updateLimitUI(mockState);
                    });
                });
            };

            renderSandboxConsoleUI();
        }
    </script>
    
    <div class="pay-modal-backdrop" id="pay-modal-backdrop"></div>
</body>
</html>
