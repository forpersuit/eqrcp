<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Send to EQT</title>
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #fff;
            --surface-soft: #f7faf9;
            --line: #d8e0dd;
            --text: #17211f;
            --muted: #66736f;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #b42318;
        }
        * {
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI Variable Display", "Segoe UI", "Aptos", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        main {
            margin: 0 auto;
            max-width: 760px;
            padding: 22px 16px 34px;
        }
        .brand {
            align-items: flex-start;
            display: grid;
            gap: 12px;
            grid-template-columns: 62px minmax(0, 1fr);
            margin-bottom: 18px;
        }

        .license-badge {
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1.2;
            letter-spacing: 0.05em;
            text-align: center;
            white-space: nowrap;
        }

        .license-badge.clock-error {
            background: rgba(220, 38, 38, 0.08) !important;
            color: #dc2626 !important;
            border: 1.2px solid #dc2626 !important;
            box-sizing: border-box;
        }
        .upload-logo {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
            height: 52px;
            padding: 7px;
            width: 52px;
        }
        h1 {
            font-size: clamp(28px, 8vw, 42px);
            line-height: 1.05;
            margin: 0 0 6px;
        }
        p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
        .upload-composer {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.07);
            padding: 16px;
        }
        .composer-meta {
            align-items: center;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .label {
            color: var(--text);
            display: block;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }
        .composer-actions {
            display: flex;
            flex-shrink: 0;
        }
        .composer-grid {
            display: grid;
            gap: 12px;
        }
        label {
            color: #334155;
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input,
        textarea,
        .btn {
            border-radius: 6px;
            font: inherit;
        }
        .form-control-file {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
            opacity: 0;
        }
        .form-control {
            background: #fff;
            border: 1px solid #cbd5e1;
            color: var(--text);
            min-height: 44px;
            padding: 11px 12px;
            width: 100%;
        }
        textarea.form-control {
            line-height: 1.55;
            min-height: 180px;
            resize: vertical;
        }
        .form-control:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            outline: none;
        }
        .btn {
            align-items: center;
            background: var(--accent);
            border: 0;
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            font-size: 14px;
            font-weight: 800;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: var(--accent-strong);
        }
        .btn-secondary {
            background: #334155;
        }
        .submit-row {
            display: grid;
            margin-top: 2px;
        }
        #submit:disabled {
            cursor: default;
            opacity: 0.7;
        }
        #selected-file-container,
        #pasted-file-container {
            display: grid;
            gap: 10px;
        }
        .pasted-file-wrapper {
            background: var(--surface-soft);
            border: 1px dashed #86b7b1;
            border-radius: 8px;
            padding: 10px;
        }
        .file-info {
            align-items: center;
            display: grid;
            gap: 10px;
            grid-template-columns: 34px minmax(0, 1fr);
        }
        .file-icon {
            align-items: center;
            background: #e7f3f1;
            border-radius: 6px;
            color: var(--accent);
            display: inline-flex;
            font-size: 20px;
            height: 34px;
            justify-content: center;
            width: 34px;
        }
        .file-name {
            color: var(--text);
            font-size: 14px;
            overflow-wrap: anywhere;
        }
        .pasted-file-wrapper img {
            border-radius: 6px;
            display: block;
            height: auto;
            max-width: 100%;
        }
        .error {
            color: var(--danger);
            font-size: 13px;
            min-height: 18px;
        }
        .lang-switch-container {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
        }
        #page-lang-select {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            padding: 6px 8px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }
        @media (max-width: 560px) {
            main {
                padding: 16px 12px 28px;
            }
        }
    </style>
</head>
<body>
    <main>
        <header class="brand">
            <div class="brand-left" style="display: flex; flex-direction: column; align-items: center; gap: 6px; width: 62px;">
                <img class="upload-logo" src="/assets/eqt-logo-mark.png" alt="EQT logo" style="margin: 0; width: 52px; height: 52px;">
                <span id="tier-badge" class="license-badge{{if .ClockTampered}} clock-error{{end}}">
                    {{if .ClockTampered}}CLOCK ERROR{{else if .LicenseTier}}{{.LicenseTier}}{{else}}FREE{{end}}
                </span>
                <div id="plus-countdown" style="font-size: 9px; font-weight: 700; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; border-radius: 6px; background: rgba(180, 35, 24, 0.04); text-align: center; text-transform: uppercase; line-height: 1.15; letter-spacing: 0.05em; display: none; flex-direction: column; align-items: center; justify-content: center; min-width: 60px; margin-top: 4px;"></div>
            </div>
            <div>
                <h1 data-i18n="title">Send from this device</h1>
                <p data-i18n="subtitle">Add files, paste an image, or write text. EQT saves everything on the receiving computer.</p>
            </div>
        </header>
        <form id="upload-form" class="upload-composer">
            <div class="composer-meta" style="margin-bottom: 16px;">
                <div class="composer-actions" style="display: flex; gap: 12px; align-items: center; width: 100%; justify-content: center;">
                    <button type="button" id="toggle-text-btn" class="btn btn-secondary" style="flex: 1; font-size: 14px; min-height: 44px; padding: 10px 16px; background: transparent; border: 1.5px solid var(--line); color: var(--text); font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; border-radius: 8px; box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04); transition: all 0.2s ease;">
                        ✍️ <span data-i18n="toggle_text_show">Write Text</span>
                    </button>
                    <label for="files" class="btn btn-secondary" style="flex: 1; font-size: 14px; min-height: 44px; padding: 10px 16px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; border-radius: 8px; box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04); margin-bottom: 0; text-align: center; line-height: 1.25; background: var(--accent); color: #fff;" data-i18n="add_files">Add files</label>
                    <input class="form-control-file" type="file" id="files" name="files" multiple>
                </div>
            </div>
            <div class="composer-grid">
                <div id="text-editor-container" style="display: none; border-bottom: 1.2px solid var(--line); padding-bottom: 12px; margin-bottom: 4px;">
                    <div style="margin-bottom: 12px;">
                        <label for="plaintext-title" data-i18n="file_name_label">Text file name</label>
                        <input class="form-control" id="plaintext-title" data-i18n-placeholder="file_name_placeholder" placeholder="Optional file name">
                    </div>
                    <div>
                        <label for="plaintext-text" data-i18n="text_label">Text</label>
                        <textarea class="form-control" id="plaintext-text" data-i18n-placeholder="text_placeholder" placeholder="Write text or paste files here"></textarea>
                    </div>
                </div>
                <div id="selected-file-container"></div>
                <div id="pasted-file-container"></div>
                <div class="error" id="upload-error" aria-live="polite"></div>
                <div class="submit-row">
                    <input class="btn" type="submit" id="submit" name="submit" data-i18n-value="btn_transfer" value="Transfer">
                </div>
            </div>
        </form>
        <div class="lang-switch-container">
            <select id="page-lang-select" aria-label="Switch Language">
                <option value="zh">简体中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="es">Español</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </main>

        var supportedLangs = {
            zh: true,
            en: true,
            ja: true,
            ko: true,
            es: true,
            de: true,
            fr: true
        };
        var serverLang = '{{.Lang}}';
        var currentLang = 'zh';
        var userLang = 'zh';
        try {
            var rawLang = navigator.language || navigator.userLanguage || 'zh';
            userLang = (rawLang && typeof rawLang === 'string') ? rawLang.toLowerCase().split('-')[0] : 'zh';
        } catch (e) {
            console.error("Language detection error:", e);
        }
        if (supportedLangs[serverLang]) {
            currentLang = serverLang;
        } else if (supportedLangs[userLang]) {
            currentLang = userLang;
        } else {
            currentLang = 'en';
        }
        var savedLang = window.localStorage.getItem('eqt-page-lang') || window.localStorage.getItem('eqt_lang');
        if (savedLang && supportedLangs[savedLang]) {
            currentLang = savedLang;
        }
        document.cookie = "eqt-lang=" + encodeURIComponent(currentLang) + ";path=/;max-age=31536000";

        function mergeDict(target, source) {
            if (!source) return;
            for (var k in source) {
                if (source.hasOwnProperty(k)) {
                    target[k] = source[k];
                }
            }
        }

        function t(key) {
            var dict = {};
            mergeDict(dict, pageTranslations.en);
            if (pageTranslations[currentLang]) {
                mergeDict(dict, pageTranslations[currentLang]);
            }
            return dict[key] || '';
        }

        function applyLanguage() {
            var dict = {};
            mergeDict(dict, pageTranslations.en);
            if (pageTranslations[currentLang]) {
                mergeDict(dict, pageTranslations[currentLang]);
            }

            var elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                if (dict[key] !== undefined) {
                    el.textContent = dict[key];
                }
            });
            var placeholders = document.querySelectorAll('[data-i18n-placeholder]');
            placeholders.forEach(function(el) {
                var key = el.getAttribute('data-i18n-placeholder');
                if (dict[key] !== undefined) {
                    el.setAttribute('placeholder', dict[key]);
                }
            });
            var values = document.querySelectorAll('[data-i18n-value]');
            values.forEach(function(el) {
                var key = el.getAttribute('data-i18n-value');
                if (dict[key] !== undefined) {
                    el.value = dict[key];
                }
            });
            document.title = currentLang === 'zh' ? '发送到 EQT' : (currentLang === 'ja' ? 'EQTに送信' : 'Send to EQT');
            var langSelect = document.getElementById('page-lang-select');
            if (langSelect) {
                langSelect.value = currentLang;
            }
        }

        var isPaid = {{.IsPaid}};
        var licenseTier = '{{.LicenseTier}}';
        var usedTransfers = {{.UsedTransfers}};
        var clockTampered = {{.ClockTampered}};
        var isPlusMode = (isPaid && !clockTampered) || (usedTransfers < 5);

        var uploadForm = document.getElementById('upload-form');
        var accumulatedFiles = [];
        var draftKey = 'eqt-upload-draft:' + window.location.pathname;
        var submitButton = document.getElementById('submit');
        var titleInput = document.getElementById('plaintext-title');
        var textArea = document.getElementById('plaintext-text');
        var fileInput = document.getElementById('files');
        var selectedFileContainer = document.getElementById('selected-file-container');
        var pastedFileContainer = document.getElementById('pasted-file-container');
        var errorBox = document.getElementById('upload-error');

        function readDraft() {
            try {
                var raw = window.localStorage.getItem(draftKey);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function saveDraft() {
            var draft = {
                title: titleInput.value,
                text: textArea.value
            };
            try {
                if (!draft.title && !draft.text) {
                    window.localStorage.removeItem(draftKey);
                    return;
                }
                window.localStorage.setItem(draftKey, JSON.stringify(draft));
            } catch (e) {
                // Draft storage is best-effort only.
            }
        }

        function clearDraft() {
            try {
                window.localStorage.removeItem(draftKey);
            } catch (e) {
                // Ignore storage failures when clearing.
            }
        }

        function restoreDraft() {
            var draft = readDraft();
            if (!draft) { return; }
            titleInput.value = draft.title || '';
            textArea.value = draft.text || '';
            if (titleInput.value.trim() || textArea.value.trim()) {
                var textEditorContainer = document.getElementById('text-editor-container');
                var toggleTextBtn = document.getElementById('toggle-text-btn');
                if (textEditorContainer) {
                    textEditorContainer.style.display = 'block';
                }
                if (toggleTextBtn) {
                    toggleTextBtn.querySelector('span').textContent = t('toggle_text_hide');
                    toggleTextBtn.style.borderColor = 'var(--accent)';
                    toggleTextBtn.style.color = 'var(--accent)';
                }
            }
        }

        function resizeTextArea() {
            textArea.style.height = 'auto';
            textArea.style.height = Math.min(textArea.scrollHeight, 260) + 'px';
        }

        function updateDraftState() {
            resizeTextArea();
            saveDraft();
        }

        function showLimitNotification(msg) {
            if (!errorBox) return;
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            if (window.limitNotificationTimer) {
                clearTimeout(window.limitNotificationTimer);
            }
            window.limitNotificationTimer = setTimeout(function() {
                if (errorBox.textContent === msg) {
                    errorBox.textContent = '';
                }
            }, 5000);
        }

        function addFileToAccumulated(file) {
            var isImg = file.type && file.type.indexOf('image/') === 0;
            var previewUrl = '';
            if (isImg) {
                try {
                    previewUrl = URL.createObjectURL(file);
                } catch (e) {
                    console.error("Failed to create object URL:", e);
                }
            }
            
            // 是否单文件大小超限 (免费模式 且 超过 50MB)
            var isOversized = !isPlusMode && (file.size > 50 * 1024 * 1024);

            accumulatedFiles.push({
                file: file,
                name: file.name || 'file_' + (accumulatedFiles.length + 1),
                isImage: isImg,
                previewUrl: previewUrl,
                isOversized: isOversized
            });
            return true;
        }

        function clearAccumulatedFiles() {
            for (var i = 0; i < accumulatedFiles.length; i++) {
                if (accumulatedFiles[i].previewUrl) {
                    URL.revokeObjectURL(accumulatedFiles[i].previewUrl);
                }
            }
            accumulatedFiles = [];
        }

        function renderFiles() {
            selectedFileContainer.innerHTML = '';
            pastedFileContainer.innerHTML = ''; // Not used as everything is rendered in selectedFileContainer
            
            var hasOversizedFile = false;
            var isCountExceeded = !isPlusMode && (accumulatedFiles.length > 5);
            
            for (var i = 0; i < accumulatedFiles.length; i++) {
                (function(index) {
                    var item = accumulatedFiles[index];
                    var fileWrapper = document.createElement('div');
                    fileWrapper.className = 'pasted-file-wrapper';
                    fileWrapper.setAttribute('data-index', index);
                    fileWrapper.style.display = 'flex';
                    fileWrapper.style.alignItems = 'center';
                    fileWrapper.style.justifyContent = 'space-between';
                    fileWrapper.style.gap = '10px';
                    
                    var isItemCountExceeded = !isPlusMode && (index >= 5);
                    var isItemOversized = item.isOversized;
                    
                    if (isItemOversized || isItemCountExceeded) {
                        fileWrapper.style.border = '1px dashed var(--danger)';
                        fileWrapper.style.background = 'rgba(180, 35, 24, 0.02)';
                    }
                    
                    var leftArea = document.createElement('div');
                    leftArea.style.flex = '1';
                    leftArea.style.minWidth = '0';
                    
                    if (item.isImage) {
                        var imgContainer = document.createElement('div');
                        imgContainer.style.display = 'flex';
                        imgContainer.style.alignItems = 'center';
                        imgContainer.style.gap = '12px';
                        
                        var img = document.createElement('img');
                        img.src = item.previewUrl;
                        img.alt = item.name;
                        img.style.maxWidth = '80px';
                        img.style.maxHeight = '80px';
                        img.style.borderRadius = '4px';
                        imgContainer.appendChild(img);
                        
                        var alertContainer = document.createElement('div');
                        alertContainer.style.display = 'flex';
                        alertContainer.style.flexDirection = 'column';
                        alertContainer.style.gap = '4px';
                        
                        var imgName = document.createElement('span');
                        imgName.className = 'file-name';
                        imgName.textContent = item.name;
                        alertContainer.appendChild(imgName);
                        
                        if (isItemOversized) {
                            var sizeAlert = document.createElement('span');
                            sizeAlert.style.color = 'var(--danger)';
                            sizeAlert.style.fontSize = '12px';
                            sizeAlert.style.fontWeight = 'bold';
                            sizeAlert.textContent = t('err_free_limit_size_short');
                            alertContainer.appendChild(sizeAlert);
                        }
                        if (isItemCountExceeded) {
                            var countAlert = document.createElement('span');
                            countAlert.style.color = 'var(--danger)';
                            countAlert.style.fontSize = '12px';
                            countAlert.style.fontWeight = 'bold';
                            countAlert.textContent = t('err_free_limit_files_short');
                            alertContainer.appendChild(countAlert);
                        }
                        imgContainer.appendChild(alertContainer);
                        leftArea.appendChild(imgContainer);
                    } else {
                        var fileInfo = document.createElement('div');
                        fileInfo.className = 'file-info';
                        
                        var fileIcon = document.createElement('span');
                        fileIcon.className = 'file-icon';
                        fileIcon.innerHTML = '&#128196;';
                        
                        var textContainer = document.createElement('div');
                        textContainer.style.display = 'flex';
                        textContainer.style.flexDirection = 'column';
                        textContainer.style.gap = '2px';
                        
                        var fileName = document.createElement('span');
                        fileName.className = 'file-name';
                        fileName.textContent = item.name;
                        textContainer.appendChild(fileName);
                        
                        if (isItemOversized) {
                            var sizeAlert = document.createElement('span');
                            sizeAlert.style.color = 'var(--danger)';
                            sizeAlert.style.fontSize = '12px';
                            sizeAlert.style.fontWeight = 'bold';
                            sizeAlert.textContent = t('err_free_limit_size_short');
                            textContainer.appendChild(sizeAlert);
                        }
                        if (isItemCountExceeded) {
                            var countAlert = document.createElement('span');
                            countAlert.style.color = 'var(--danger)';
                            countAlert.style.fontSize = '12px';
                            countAlert.style.fontWeight = 'bold';
                            countAlert.textContent = t('err_free_limit_files_short');
                            textContainer.appendChild(countAlert);
                        }
                        
                        fileInfo.appendChild(fileIcon);
                        fileInfo.appendChild(textContainer);
                        leftArea.appendChild(fileInfo);
                    }
                    
                    fileWrapper.appendChild(leftArea);
                    
                    // 只有是 isPlusMode 才显示删除按钮
                    if (isPlusMode) {
                        var deleteBtn = document.createElement('button');
                        deleteBtn.type = 'button';
                        deleteBtn.innerHTML = '&times;';
                        deleteBtn.style.background = 'none';
                        deleteBtn.style.border = 'none';
                        deleteBtn.style.color = 'var(--danger)';
                        deleteBtn.style.fontSize = '22px';
                        deleteBtn.style.cursor = 'pointer';
                        deleteBtn.style.padding = '0 8px';
                        deleteBtn.style.display = 'inline-flex';
                        deleteBtn.style.alignItems = 'center';
                        deleteBtn.style.justifyContent = 'center';
                        
                        deleteBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            if (item.previewUrl) {
                                URL.revokeObjectURL(item.previewUrl);
                            }
                            accumulatedFiles.splice(index, 1);
                            renderFiles();
                        });
                        fileWrapper.appendChild(deleteBtn);
                    }
                    
                    selectedFileContainer.appendChild(fileWrapper);
                    
                    if (item.isOversized) {
                        hasOversizedFile = true;
                    }
                })(i);
            }
            
            // 校验整体是否超限并控制按钮与提示
            var isSizeExceeded = !isPlusMode && hasOversizedFile;
            
            if (isCountExceeded || isSizeExceeded) {
                submitButton.disabled = true;
                submitButton.style.opacity = '0.5';
                submitButton.style.cursor = 'not-allowed';
                
                var errorMsg = '';
                if (isCountExceeded && isSizeExceeded) {
                    errorMsg = t('err_free_limit_both_global');
                } else if (isCountExceeded) {
                    errorMsg = t('err_free_limit_files_global');
                } else {
                    errorMsg = t('err_free_limit_size_global');
                }
                errorBox.textContent = errorMsg;
                errorBox.style.display = 'block';
            } else {
                submitButton.disabled = false;
                submitButton.style.opacity = '1';
                submitButton.style.cursor = 'pointer';
                errorBox.textContent = '';
            }
        }

        function readClipboardFiles(clipboardData) {
            var files = [];
            if (!clipboardData) { return files; }
            if (clipboardData.items && clipboardData.items.length) {
                for (var i = 0; i < clipboardData.items.length; i++) {
                    var item = clipboardData.items[i];
                    if (item.kind === 'file') {
                        var blob = item.getAsFile();
                        if (blob) { files.push(blob); }
                    }
                }
            } else if (clipboardData.files && clipboardData.files.length) {
                for (var j = 0; j < clipboardData.files.length; j++) {
                    files.push(clipboardData.files[j]);
                }
            }
            return files;
        }

        function insertTextAtCursor(value) {
            if (!value) { return; }
            if (typeof textArea.setRangeText === 'function' && typeof textArea.selectionStart === 'number') {
                textArea.setRangeText(value, textArea.selectionStart, textArea.selectionEnd, 'end');
            } else {
                var start = textArea.selectionStart || textArea.value.length;
                var end = textArea.selectionEnd || textArea.value.length;
                textArea.value = textArea.value.slice(0, start) + value + textArea.value.slice(end);
            }
            textArea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function renderUploadFailedPage(reason) {
            var displayReason = reason || t('err_reason_default');
            var badgeText = clockTampered ? 'CLOCK ERROR' : (licenseTier ? licenseTier : 'FREE');
            var badgeClass = clockTampered ? 'clock-error' : '';
            
            var failHtml = `
            <main style="width: min(100%, 480px); padding: 40px 20px; text-align: center; margin: 0 auto;">
                <img class="brand-logo" src="/assets/eqt-logo-horizontal.png" alt="EQT logo" style="display: block; height: auto; max-width: 140px; margin: 0 auto 32px;">
                
                <div class="status-card" style="background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 32px 24px; box-shadow: 0 10px 30px rgba(17, 24, 39, 0.04); margin-bottom: 24px; position: relative;">
                    <span class="license-badge ${badgeClass}" style="position: absolute; top: 16px; right: 16px; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 4px; line-height: 1.2; letter-spacing: 0.05em; background: var(--accent); color: #fff;">
                        ${badgeText}
                    </span>
                    <div class="fail-badge" style="width: 64px; height: 64px; border-radius: 50%; background: #fef3f2; border: 2px solid #fee4e2; color: #d92d20; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; margin-bottom: 18px; box-shadow: 0 4px 12px rgba(217, 45, 32, 0.08);">✕</div>
                    <h1 style="margin: 0 0 8px; font-size: 24px; font-weight: 800; color: var(--text-primary);">${t('fail_header')}</h1>
                    <p class="summary" style="margin: 0 0 24px; color: var(--muted); font-size: 15px; line-height: 1.5;">
                        ${displayReason}
                    </p>
                    <button id="retry-btn" class="btn" style="width: 100%; border-radius: 6px; font: inherit; font-weight: 800; min-height: 42px; display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: #fff; border: 0; cursor: pointer;">
                        ${t('btn_retry')}
                    </button>
                </div>
            </main>
            `;
            
            document.body.innerHTML = failHtml;
            document.getElementById('retry-btn').addEventListener('click', function() {
                window.location.reload();
            });
        }

        textArea.addEventListener('paste', function(e) {
            var clipboardData = e.clipboardData || window.clipboardData;
            var files = readClipboardFiles(clipboardData);
            if (!files.length) { return; }
            e.preventDefault();
            var pastedText = clipboardData && clipboardData.getData ? clipboardData.getData('text/plain') : '';
            if (pastedText) {
                insertTextAtCursor(pastedText);
            }
            for (var i = 0; i < files.length; i++) {
                addFileToAccumulated(files[i]);
            }
            renderFiles();
            saveDraft();
        });

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            errorBox.textContent = '';
            submitButton.value = t('btn_transferring');
            submitButton.disabled = true;
            
            var formData = new FormData(uploadForm);
            formData.delete('files'); // remove raw files from input to avoid duplicates
            
            var filesToUpload = [];
            var totalFilesSize = 0;

            var textInput = document.getElementById('plaintext-text');
            if (titleInput.value || textInput.value) {
                var currentDate = new Date().toJSON().slice(0, 19).replace(/[-T:]/g, '_');
                var filename = titleInput.value || ('eqt-text-file-' + currentDate);
                var blob = new Blob([textInput.value + '\n'], { type: 'text/plain' });
                filesToUpload.push({
                    type: 'text',
                    size: blob.size,
                    name: filename + '.txt',
                    blob: blob
                });
                totalFilesSize += blob.size;
            }

            for (var i = 0; i < accumulatedFiles.length; i++) {
                var file = accumulatedFiles[i].file;
                var fileName = accumulatedFiles[i].name;
                filesToUpload.push({
                    type: 'file',
                    size: file.size,
                    name: fileName,
                    index: i,
                    file: file
                });
                totalFilesSize += file.size;
            }

            // Append metadata of files & sizes BEFORE the files themselves
            var metadata = [];
            for (var k = 0; k < filesToUpload.length; k++) {
                metadata.push(encodeURIComponent(filesToUpload[k].name) + ":" + filesToUpload[k].size);
            }
            formData.append('fileMetadata', metadata.join(','));

            // Append the actual file payloads
            for (var k = 0; k < filesToUpload.length; k++) {
                var item = filesToUpload[k];
                if (item.type === 'text') {
                    formData.append('textFile', item.blob, item.name);
                } else {
                    formData.append('files', item.file, item.name);
                }
            }

            // Hide delete buttons and show circular progress rings for files in selectedFileContainer
            var fileWrappers = selectedFileContainer.querySelectorAll('.pasted-file-wrapper');
            fileWrappers.forEach(function(wrapper) {
                var deleteBtn = wrapper.querySelector('.delete-file-btn') || wrapper.querySelector('button');
                if (deleteBtn) {
                    deleteBtn.style.display = 'none';
                }
                
                var index = parseInt(wrapper.getAttribute('data-index'), 10);
                var ringContainer = document.createElement('div');
                ringContainer.className = 'progress-ring-container';
                ringContainer.style.display = 'inline-flex';
                ringContainer.style.alignItems = 'center';
                ringContainer.style.justifyContent = 'center';
                ringContainer.style.position = 'relative';
                ringContainer.style.width = '32px';
                ringContainer.style.height = '32px';
                ringContainer.style.flexShrink = '0';
                ringContainer.innerHTML = `
                    <svg width="32" height="32" viewBox="0 0 32 32">
                        <circle cx="16" cy="16" r="13" fill="none" stroke="#e2e8f0" stroke-width="2.5"/>
                        <circle class="ring-track" cx="16" cy="16" r="13" fill="none"
                            stroke="#0f766e" stroke-width="2.5"
                            stroke-dasharray="81.68"
                            stroke-dashoffset="81.68"
                            stroke-linecap="round"
                            transform="rotate(-90 16 16)"
                            style="transition: stroke-dashoffset 0.1s ease-in-out;"/>
                    </svg>
                    <span class="ring-label" style="position: absolute; font-size: 8px; font-weight: 800; color: var(--accent-strong);">0%</span>
                `;
                wrapper.appendChild(ringContainer);
            });

            titleInput.disabled = true;
            textArea.disabled = true;
            fileInput.disabled = true;
            var addFilesLabel = document.querySelector('label[for="files"]');
            if (addFilesLabel) {
                addFilesLabel.style.pointerEvents = 'none';
                addFilesLabel.style.opacity = '0.5';
            }

            var clientID = '';
            var cookies = document.cookie.split(';');
            for (var cIdx = 0; cIdx < cookies.length; cIdx++) {
                var pair = cookies[cIdx].trim().split('=');
                if (pair[0] === 'eqt') {
                    clientID = pair[1];
                    break;
                }
            }

            function handleError(status, text) {
                var reason = '';
                if (status === 413) {
                    reason = t('err_reason_too_large') + (text ? ' (' + text + ')' : '');
                } else if (status === 403) {
                    reason = text || t('err_reason_default');
                } else if (status === 500) {
                    reason = t('err_reason_server') + (text ? ' (' + text + ')' : '');
                } else if (status) {
                    reason = t('err_reason_default') + ' (' + text + ')';
                } else {
                    reason = t('err_reason_network');
                }
                renderUploadFailedPage(reason);
            }

            var uploadIndex = 0;
            
            function startNextTusUpload() {
                if (uploadIndex >= filesToUpload.length) {
                    var doneXhr = new XMLHttpRequest();
                    doneXhr.open('POST', '{{.Route}}?done=true');
                    doneXhr.onload = function() {
                        if (doneXhr.status >= 200 && doneXhr.status < 300) {
                            clearDraft();
                            clearAccumulatedFiles();
                            
                            var html = doneXhr.responseText;
                            var parser = new DOMParser();
                            var nextDoc = parser.parseFromString(html, 'text/html');
                            document.title = nextDoc.title || document.title;
                            document.head.innerHTML = nextDoc.head.innerHTML;
                            document.body.innerHTML = nextDoc.body.innerHTML;
                            var scripts = document.body.querySelectorAll('script');
                            for (var sIdx = 0; sIdx < scripts.length; sIdx++) {
                                var oldScript = scripts[sIdx];
                                var newScript = document.createElement('script');
                                for (var attrIdx = 0; attrIdx < oldScript.attributes.length; attrIdx++) {
                                    var attr = oldScript.attributes[attrIdx];
                                    newScript.setAttribute(attr.name, attr.value);
                                }
                                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                                oldScript.parentNode.replaceChild(newScript, oldScript);
                            }
                        } else {
                            handleError(doneXhr.status, doneXhr.responseText);
                        }
                    };
                    doneXhr.onerror = function() {
                        handleError(0, '');
                    };
                    doneXhr.send();
                    return;
                }

                var item = filesToUpload[uploadIndex];
                var uploadBlob = item.type === 'text' ? item.blob : item.file;
                
                var upload = new tus.Upload(uploadBlob, {
                    endpoint: '{{.Route}}/tus/',
                    retryDelays: [0, 1000, 3000, 5000, 10000],
                    metadata: {
                        filename: item.name,
                        clientid: clientID,
                        totalsize: totalFilesSize.toString(),
                        totalfiles: filesToUpload.length.toString()
                    },
                    onError: function(error) {
                        console.error("Tus upload error: ", error);
                        if (item.type === 'file') {
                            var wrapper = selectedFileContainer.querySelector('[data-index="' + item.index + '"]');
                            if (wrapper) {
                                var ring = wrapper.querySelector('.progress-ring-container');
                                if (ring) {
                                    ring.innerHTML = `
                                        <div style="width: 24px; height: 24px; border-radius: 50%; background: #fef3f2; border: 1.2px solid #fecaca; color: #b42318; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900;">✕</div>
                                    `;
                                }
                            }
                        }
                        handleError(500, error.message);
                    },
                    onProgress: function(bytesSent, bytesTotal) {
                        var percent = Math.round((bytesSent / bytesTotal) * 100);
                        if (item.type === 'file') {
                            var wrapper = selectedFileContainer.querySelector('[data-index="' + item.index + '"]');
                            if (wrapper) {
                                var ring = wrapper.querySelector('.progress-ring-container');
                                if (ring) {
                                    var track = ring.querySelector('.ring-track');
                                    var label = ring.querySelector('.ring-label');
                                    var circumference = 81.68;
                                    var offset = circumference * (1 - percent / 100);
                                    if (track) track.style.strokeDashoffset = offset;
                                    if (label) label.textContent = percent + '%';
                                }
                            }
                        }
                    },
                    onSuccess: function() {
                        if (item.type === 'file') {
                            var wrapper = selectedFileContainer.querySelector('[data-index="' + item.index + '"]');
                            if (wrapper) {
                                var ring = wrapper.querySelector('.progress-ring-container');
                                if (ring) {
                                    ring.innerHTML = `
                                        <div class="ring-done" style="width: 24px; height: 24px; border-radius: 50%; background: #d1fae5; border: 1.2px solid #a7f3d0; color: #065f46; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900;">✓</div>
                                    `;
                                }
                            }
                        }
                        uploadIndex++;
                        startNextTusUpload();
                    }
                });

                upload.start();
            });

        var langSelect = document.getElementById('page-lang-select');
        if (langSelect) {
            langSelect.addEventListener('change', function() {
                currentLang = langSelect.value;
                window.localStorage.setItem('eqt_lang', currentLang);
                window.localStorage.setItem('eqt-page-lang', currentLang);
                document.cookie = "eqt-lang=" + encodeURIComponent(currentLang) + ";path=/;max-age=31536000";
                applyLanguage();
            });
        }

        var toggleTextBtn = document.getElementById('toggle-text-btn');
        var textEditorContainer = document.getElementById('text-editor-container');
        if (toggleTextBtn && textEditorContainer) {
            toggleTextBtn.addEventListener('click', function() {
                if (textEditorContainer.style.display === 'none' || textEditorContainer.style.display === '') {
                    textEditorContainer.style.display = 'block';
                    toggleTextBtn.querySelector('span').textContent = t('toggle_text_hide');
                    toggleTextBtn.style.borderColor = 'var(--accent)';
                    toggleTextBtn.style.color = 'var(--accent)';
                } else {
                    textEditorContainer.style.display = 'none';
                    toggleTextBtn.querySelector('span').textContent = t('toggle_text_show');
                    toggleTextBtn.style.borderColor = 'var(--line)';
                    toggleTextBtn.style.color = 'var(--text)';
                }
            });
        }

        titleInput.addEventListener('input', updateDraftState);
        textArea.addEventListener('input', updateDraftState);
        
        fileInput.addEventListener('change', function() {
            if (!fileInput.files || !fileInput.files.length) { return; }
            if (!isPlusMode) {
                clearAccumulatedFiles();
            }
            for (var i = 0; i < fileInput.files.length; i++) {
                addFileToAccumulated(fileInput.files[i]);
            }
            fileInput.value = ''; // clear value so change event triggers again for the same file
            renderFiles();
        });

        window.addEventListener('beforeunload', function(e) {
            if (!titleInput.value.trim() && !textArea.value.trim() && !accumulatedFiles.length) {
                return;
            }
            e.preventDefault();
            e.returnValue = '';
            return '';
        });

        restoreDraft();
        applyLanguage();
        resizeTextArea();

        // Plus limit logic for Free tier
        var countdownEl = document.getElementById('plus-countdown');
        if (!isPaid && !clockTampered) {
            var remaining = Math.max(0, 5 - usedTransfers);
            countdownEl.style.display = 'inline-flex';
            if (remaining > 0) {
                countdownEl.innerHTML = 'left<span style="font-size: 15px; font-weight: 900; margin-top: 2px; color: var(--danger);">' + remaining + '</span>';
            } else {
                countdownEl.innerHTML = 'limit<span style="font-size: 10px; font-weight: 900; margin-top: 2px; color: var(--danger);">exceeded</span>';
            }
        }
    </script>
</body>
</html>
