<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Send to EQT</title>
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #fff;
            --surface-soft: #f7faf9;
            --line: #d8e0dd;
            --text: #17211f;
            --muted: #66736f;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #b42318;
        }
        * {
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI Variable Display", "Segoe UI", "Aptos", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        main {
            margin: 0 auto;
            max-width: 760px;
            padding: 22px 16px 34px;
        }
        .brand {
            align-items: flex-start;
            display: grid;
            gap: 12px;
            grid-template-columns: 62px minmax(0, 1fr);
            margin-bottom: 18px;
        }

        .license-badge {
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1.2;
            letter-spacing: 0.05em;
            text-align: center;
            white-space: nowrap;
        }

        .license-badge.clock-error {
            background: rgba(220, 38, 38, 0.08) !important;
            color: #dc2626 !important;
            border: 1.2px solid #dc2626 !important;
            box-sizing: border-box;
        }
        .upload-logo {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
            height: 52px;
            padding: 7px;
            width: 52px;
        }
        h1 {
            font-size: clamp(28px, 8vw, 42px);
            line-height: 1.05;
            margin: 0 0 6px;
        }
        p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
        .upload-composer {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.07);
            padding: 16px;
        }
        .composer-meta {
            align-items: center;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .label {
            color: var(--text);
            display: block;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }
        .composer-actions {
            display: flex;
            flex-shrink: 0;
        }
        .composer-grid {
            display: grid;
            gap: 12px;
        }
        label {
            color: #334155;
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input,
        textarea,
        .btn {
            border-radius: 6px;
            font: inherit;
        }
        .form-control {
            background: #fff;
            border: 1px solid #cbd5e1;
            color: var(--text);
            min-height: 44px;
            padding: 11px 12px;
            width: 100%;
        }
        textarea.form-control {
            line-height: 1.55;
            min-height: 180px;
            resize: vertical;
        }
        .form-control:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            outline: none;
        }
        .btn {
            align-items: center;
            background: var(--accent);
            border: 0;
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            font-size: 14px;
            font-weight: 800;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: var(--accent-strong);
        }
        .btn-secondary {
            background: #334155;
        }
        .submit-row {
            display: grid;
            margin-top: 2px;
        }
        #submit:disabled {
            cursor: default;
            opacity: 0.7;
        }
        #selected-file-container,
        #pasted-file-container {
            display: grid;
            gap: 10px;
        }
        .pasted-file-wrapper {
            background: var(--surface-soft);
            border: 1px dashed #86b7b1;
            border-radius: 8px;
            padding: 10px;
        }
        .file-info {
            align-items: center;
            display: grid;
            gap: 10px;
            grid-template-columns: 34px minmax(0, 1fr);
        }
        .file-icon {
            align-items: center;
            background: #e7f3f1;
            border-radius: 6px;
            color: var(--accent);
            display: inline-flex;
            font-size: 20px;
            height: 34px;
            justify-content: center;
            width: 34px;
        }
        .file-name {
            color: var(--text);
            font-size: 14px;
            overflow-wrap: anywhere;
        }
        .pasted-file-wrapper img {
            border-radius: 6px;
            display: block;
            height: auto;
            max-width: 100%;
        }
        .error {
            color: var(--danger);
            font-size: 13px;
            min-height: 18px;
        }
        .lang-switch-container {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        #page-lang-select {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            padding: 6px 8px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }
        @media (max-width: 560px) {
            main {
                padding: 16px 12px 28px;
            }
            .composer-meta {
                align-items: stretch;
                flex-direction: column;
            }
            .composer-actions,
            .btn {
                width: 100%;
            }
        /* 圆圈进度条样式 */
        .progress-ring-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }
        .progress-ring {
            width: 36px;
            height: 36px;
        }
        .progress-ring__circle-bg {
            stroke: var(--line);
            stroke-width: 3;
            fill: transparent;
        }
        .progress-ring__circle {
            stroke: var(--accent);
            stroke-width: 3;
            fill: transparent;
            stroke-dasharray: 88;
            stroke-dashoffset: 88;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.1s ease;
        }
        .progress-ring__circle.completed {
            stroke: var(--success);
        }
        .progress-ring__circle.failed {
            stroke: var(--danger);
        }
        .progress-ring-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text);
            line-height: 1;
        }
        .quota-banner-card {
            background: rgba(15, 118, 110, 0.05);
            border: 1px solid rgba(15, 118, 110, 0.15);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--accent-strong);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.03);
            transition: all 0.2s ease;
        }
        .quota-banner-card.exceeded {
            background: rgba(180, 35, 24, 0.05);
            border: 1px solid rgba(180, 35, 24, 0.15);
            color: var(--danger);
            box-shadow: 0 4px 12px rgba(180, 35, 24, 0.03);
        }
    </style>
</head>
<body>
    <main>
        <header class="brand">
            <div class="brand-left" style="display: flex; flex-direction: column; align-items: center; gap: 6px; width: 62px;">
                <img class="upload-logo" src="/assets/eqt-logo-mark.png" alt="EQT logo" style="margin: 0; width: 52px; height: 52px;">
                <span id="tier-badge" class="license-badge{{if .ClockTampered}} clock-error{{end}}">
                    {{if .ClockTampered}}CLOCK ERROR{{else if .LicenseTier}}{{.LicenseTier}}{{else}}FREE{{end}}
                </span>
                <div id="plus-countdown" style="font-size: 9px; font-weight: 700; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; border-radius: 6px; background: rgba(180, 35, 24, 0.04); text-align: center; text-transform: uppercase; line-height: 1.15; letter-spacing: 0.05em; display: none; flex-direction: column; align-items: center; justify-content: center; min-width: 60px; margin-top: 4px;"></div>
            </div>
            <div>
                <h1 data-i18n="title">Send from this device</h1>
                <p data-i18n="subtitle">Add files, paste an image, or write text. EQT saves everything on the receiving computer.</p>
            </div>
        </header>
        <div id="quota-banner" style="margin-bottom: 18px; display: none;"></div>
        <form id="upload-form" class="upload-composer">
            <div class="composer-meta">
                <div>
                    <strong class="label" data-i18n="composer">Composer</strong>
                    <div class="hint" data-i18n="composer_hint">Text becomes a .txt file. Shift+Enter keeps a new line.</div>
                </div>
                <div class="composer-actions">
                    <label for="files" class="btn btn-secondary" data-i18n="add_files">Add files</label>
                    <input class="form-control-file" type="file" id="files" name="files" multiple hidden>
                </div>
            </div>
            <div class="composer-grid">
                <div>
                    <label for="plaintext-title" data-i18n="file_name_label">Text file name</label>
                    <input class="form-control" id="plaintext-title" data-i18n-placeholder="file_name_placeholder" placeholder="Optional file name">
                </div>
                <div>
                    <label for="plaintext-text" data-i18n="text_label">Text</label>
                    <textarea class="form-control" id="plaintext-text" data-i18n-placeholder="text_placeholder" placeholder="Write text or paste files here"></textarea>
                </div>
                <div id="selected-file-container"></div>
                <div id="pasted-file-container"></div>
                <div class="error" id="upload-error" aria-live="polite"></div>
                <div class="submit-row" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <input class="btn" type="submit" id="submit" name="submit" data-i18n-value="btn_transfer" value="Transfer">
                    <button class="btn" type="button" id="stop-btn" style="display: none; background: #e53e3e; color: #fff; border: none;" data-i18n="btn_stop">Stop</button>
                </div>
            </div>
        </form>
        <div class="lang-switch-container">
            <select id="page-lang-select" aria-label="Switch Language">
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="es">Español</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="zh">简体中文</option>
            </select>
        </div>
    </main>

        var supportedLangs = {
            zh: true,
            en: true,
            ja: true,
            ko: true,
            es: true,
            de: true,
            fr: true
        };
        var serverLang = '{{.Lang}}';
        var currentLang = 'zh';
        var userLang = 'zh';
        try {
            var rawLang = navigator.language || navigator.userLanguage || 'zh';
            userLang = (rawLang && typeof rawLang === 'string') ? rawLang.toLowerCase().split('-')[0] : 'zh';
        } catch (e) {
            console.error("Language detection error:", e);
        }
        if (supportedLangs[serverLang]) {
            currentLang = serverLang;
        } else if (supportedLangs[userLang]) {
            currentLang = userLang;
        } else {
            currentLang = 'en';
        }
        var savedLang = window.localStorage.getItem('eqt-page-lang') || window.localStorage.getItem('eqt_lang');
        if (savedLang) {
            savedLang = savedLang.toLowerCase().split('-')[0];
        }
        if (savedLang && supportedLangs[savedLang]) {
            currentLang = savedLang;
        }
        document.cookie = "eqt-lang=" + encodeURIComponent(currentLang) + ";path=/;max-age=31536000";

        function mergeDict(target, source) {
            if (!source) return;
            for (var k in source) {
                if (source.hasOwnProperty(k)) {
                    target[k] = source[k];
                }
            }
        }

        function t(key) {
            var dict = {};
            mergeDict(dict, pageTranslations.en);
            if (pageTranslations[currentLang]) {
                mergeDict(dict, pageTranslations[currentLang]);
            }
            return dict[key] || '';
        }

        function applyLanguage() {
            var dict = {};
            mergeDict(dict, pageTranslations.en);
            if (pageTranslations[currentLang]) {
                mergeDict(dict, pageTranslations[currentLang]);
            }

            var elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                if (dict[key] !== undefined) {
                    el.textContent = dict[key];
                }
            });
            var placeholders = document.querySelectorAll('[data-i18n-placeholder]');
            placeholders.forEach(function(el) {
                var key = el.getAttribute('data-i18n-placeholder');
                if (dict[key] !== undefined) {
                    el.setAttribute('placeholder', dict[key]);
                }
            });
            var values = document.querySelectorAll('[data-i18n-value]');
            values.forEach(function(el) {
                var key = el.getAttribute('data-i18n-value');
                if (dict[key] !== undefined) {
                    el.value = dict[key];
                }
            });
            document.title = currentLang === 'zh' ? '发送到 EQT' : (currentLang === 'ja' ? 'EQTに送信' : 'Send to EQT');
            var langSelect = document.getElementById('page-lang-select');
            if (langSelect) {
                langSelect.value = currentLang;
            }
        }

        var isPaid = {{.IsPaid}};
        var licenseTier = '{{.LicenseTier}}';
        var usedTransfers = {{.UsedTransfers}};
        var clockTampered = {{.ClockTampered}};
        var isPaidMode = isPaid && !clockTampered;
        var clientID = '{{.ClientID}}';
        window.currentClientID = clientID;

        var uploadForm = document.getElementById('upload-form');
        var accumulatedFiles = [];
        var draftKey = 'eqt-upload-draft:' + window.location.pathname;
        var submitButton = document.getElementById('submit');
        var titleInput = document.getElementById('plaintext-title');
        var textArea = document.getElementById('plaintext-text');
        var fileInput = document.getElementById('files');
        var selectedFileContainer = document.getElementById('selected-file-container');
        var pastedFileContainer = document.getElementById('pasted-file-container');
        var errorBox = document.getElementById('upload-error');
        
        var currentTusUpload = null;
        var isUploadStopped = false;
        var isUploading = false;

        function readDraft() {
            try {
                var raw = window.localStorage.getItem(draftKey);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function saveDraft() {
            var draft = {
                title: titleInput.value,
                text: textArea.value
            };
            try {
                if (!draft.title && !draft.text) {
                    window.localStorage.removeItem(draftKey);
                    return;
                }
                window.localStorage.setItem(draftKey, JSON.stringify(draft));
            } catch (e) {
                // Draft storage is best-effort only.
            }
        }

        function clearDraft() {
            try {
                window.localStorage.removeItem(draftKey);
            } catch (e) {
                // Ignore storage failures when clearing.
            }
        }

        function restoreDraft() {
            var draft = readDraft();
            if (!draft) { return; }
            titleInput.value = draft.title || '';
            textArea.value = draft.text || '';
        }

        function resizeTextArea() {
            textArea.style.height = 'auto';
            textArea.style.height = Math.min(textArea.scrollHeight, 260) + 'px';
        }

        function updateDraftState() {
            resizeTextArea();
            saveDraft();
            if (typeof updateLimitUI === 'function') {
                updateLimitUI(usedTransfers);
            }
        }

        function showLimitNotification(msg) {
            if (!errorBox) return;
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            if (window.limitNotificationTimer) {
                clearTimeout(window.limitNotificationTimer);
            }
            window.limitNotificationTimer = setTimeout(function() {
                if (errorBox.textContent === msg) {
                    errorBox.textContent = '';
                }
            }, 5000);
        }

        function addFileToAccumulated(file) {
            var isImg = file.type && file.type.indexOf('image/') === 0;
            var previewUrl = '';
            if (isImg) {
                previewUrl = URL.createObjectURL(file);
            }
            
            // 是否单文件大小超限 (免费模式 且 超过 50MB)
            var isOversized = !isPaidMode && (file.size > 50 * 1024 * 1024);

            accumulatedFiles.push({
                file: file,
                name: file.name || 'file_' + (accumulatedFiles.length + 1),
                isImage: isImg,
                previewUrl: previewUrl,
                isOversized: isOversized
            });
            return true;
        }

        function clearAccumulatedFiles() {
            for (var i = 0; i < accumulatedFiles.length; i++) {
                if (accumulatedFiles[i].previewUrl) {
                    URL.revokeObjectURL(accumulatedFiles[i].previewUrl);
                }
            }
            accumulatedFiles = [];
        }

        function renderFiles() {
            if (isUploading) { return; }
            selectedFileContainer.innerHTML = '';
            pastedFileContainer.innerHTML = ''; // Not used as everything is rendered in selectedFileContainer
            
            var hasOversizedFile = false;
            var isCountExceeded = !isPaidMode && (accumulatedFiles.length > 5);
            
            for (var i = 0; i < accumulatedFiles.length; i++) {
                (function(index) {
                    var item = accumulatedFiles[index];
                    var fileWrapper = document.createElement('div');
                    fileWrapper.className = 'pasted-file-wrapper';
                    fileWrapper.style.display = 'flex';
                    fileWrapper.style.alignItems = 'center';
                    fileWrapper.style.justifyContent = 'space-between';
                    fileWrapper.style.gap = '10px';
                    
                    var isLimitActive = !isPaidMode && (usedTransfers >= 5);
                    var isItemCountExceeded = isLimitActive && (index >= 5);
                    var isItemOversized = isLimitActive && item.isOversized;
                    
                    if (isItemOversized || isItemCountExceeded) {
                        fileWrapper.style.border = '1px dashed var(--danger)';
                        fileWrapper.style.background = 'rgba(180, 35, 24, 0.02)';
                    }
                    
                    var leftArea = document.createElement('div');
                    leftArea.style.flex = '1';
                    leftArea.style.minWidth = '0';
                    
                    if (item.isImage) {
                        var imgContainer = document.createElement('div');
                        imgContainer.style.display = 'flex';
                        imgContainer.style.alignItems = 'center';
                        imgContainer.style.gap = '12px';
                        
                        var img = document.createElement('img');
                        img.src = item.previewUrl;
                        img.alt = item.name;
                        img.style.maxWidth = '80px';
                        img.style.maxHeight = '80px';
                        img.style.borderRadius = '4px';
                        imgContainer.appendChild(img);
                        
                        var alertContainer = document.createElement('div');
                        alertContainer.style.display = 'flex';
                        alertContainer.style.flexDirection = 'column';
                        alertContainer.style.gap = '4px';
                        
                        var imgName = document.createElement('span');
                        imgName.className = 'file-name';
                        imgName.textContent = item.name;
                        alertContainer.appendChild(imgName);
                        
                        if (isItemOversized) {
                            var sizeAlert = document.createElement('span');
                            sizeAlert.style.color = 'var(--danger)';
                            sizeAlert.style.fontSize = '12px';
                            sizeAlert.style.fontWeight = 'bold';
                            sizeAlert.textContent = t('err_free_limit_size_short');
                            alertContainer.appendChild(sizeAlert);
                        }
                        if (isItemCountExceeded) {
                            var countAlert = document.createElement('span');
                            countAlert.style.color = 'var(--danger)';
                            countAlert.style.fontSize = '12px';
                            countAlert.style.fontWeight = 'bold';
                            countAlert.textContent = t('err_free_limit_files_short');
                            alertContainer.appendChild(countAlert);
                        }
                        imgContainer.appendChild(alertContainer);
                        leftArea.appendChild(imgContainer);
                    } else {
                        var fileInfo = document.createElement('div');
                        fileInfo.className = 'file-info';
                        
                        var fileIcon = document.createElement('span');
                        fileIcon.className = 'file-icon';
                        fileIcon.innerHTML = '&#128196;';
                        
                        var textContainer = document.createElement('div');
                        textContainer.style.display = 'flex';
                        textContainer.style.flexDirection = 'column';
                        textContainer.style.gap = '2px';
                        
                        var fileName = document.createElement('span');
                        fileName.className = 'file-name';
                        fileName.textContent = item.name;
                        textContainer.appendChild(fileName);
                        
                        if (isItemOversized) {
                            var sizeAlert = document.createElement('span');
                            sizeAlert.style.color = 'var(--danger)';
                            sizeAlert.style.fontSize = '12px';
                            sizeAlert.style.fontWeight = 'bold';
                            sizeAlert.textContent = t('err_free_limit_size_short');
                            textContainer.appendChild(sizeAlert);
                        }
                        if (isItemCountExceeded) {
                            var countAlert = document.createElement('span');
                            countAlert.style.color = 'var(--danger)';
                            countAlert.style.fontSize = '12px';
                            countAlert.style.fontWeight = 'bold';
                            countAlert.textContent = t('err_free_limit_files_short');
                            textContainer.appendChild(countAlert);
                        }
                        
                        fileInfo.appendChild(fileIcon);
                        fileInfo.appendChild(textContainer);
                        leftArea.appendChild(fileInfo);
                    }
                    
                    var formatBytes = function(bytes) {
                        if (bytes === undefined || bytes === null || isNaN(bytes)) return '0 B';
                        if (bytes === 0) return '0 B';
                        var k = 1024;
                        var sizes = ['B', 'KB', 'MB', 'GB'];
                        var i = Math.floor(Math.log(bytes) / Math.log(k));
                        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
                    };
                    var fileSizeSpan = document.createElement('span');
                    fileSizeSpan.textContent = formatBytes(item.size || (item.file && item.file.size) || 0);
                    fileSizeSpan.style.fontSize = '12px';
                    fileSizeSpan.style.color = 'var(--text-muted)';
                    fileSizeSpan.style.fontWeight = '600';
                    fileSizeSpan.style.whiteSpace = 'nowrap';
                    fileSizeSpan.style.marginLeft = 'auto';
                    fileSizeSpan.style.marginRight = '8px';
                    fileSizeSpan.style.flexShrink = '0';

                    fileWrapper.appendChild(leftArea);
                    fileWrapper.appendChild(fileSizeSpan);
                    
                    // 无论是否是 isPlusMode，都显示删除按钮，以便用户可以移除超限文件
                    var deleteBtn = document.createElement('button');
                    deleteBtn.type = 'button';
                    deleteBtn.innerHTML = '&times;';
                    deleteBtn.style.background = 'none';
                    deleteBtn.style.border = 'none';
                    deleteBtn.style.color = 'var(--danger)';
                    deleteBtn.style.fontSize = '22px';
                    deleteBtn.style.cursor = 'pointer';
                    deleteBtn.style.padding = '0 8px';
                    deleteBtn.style.display = 'inline-flex';
                    deleteBtn.style.alignItems = 'center';
                    deleteBtn.style.justifyContent = 'center';
                    
                    deleteBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        if (item.previewUrl) {
                            URL.revokeObjectURL(item.previewUrl);
                        }
                        accumulatedFiles.splice(index, 1);
                        renderFiles();
                    });
                    fileWrapper.appendChild(deleteBtn);

                    // Circular progress ring wrapper
                    var progressWrapper = document.createElement('div');
                    progressWrapper.className = 'progress-ring-wrapper';
                    progressWrapper.id = 'progress-wrapper-' + index;
                    progressWrapper.style.display = 'none';

                    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svg.setAttribute('class', 'progress-ring');
                    svg.setAttribute('width', '36');
                    svg.setAttribute('height', '36');
                    svg.style.transform = 'rotate(-90deg)';
                    svg.style.transformOrigin = '50% 50%';

                    var circleBg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circleBg.setAttribute('class', 'progress-ring__circle-bg');
                    circleBg.setAttribute('r', '14');
                    circleBg.setAttribute('cx', '18');
                    circleBg.setAttribute('cy', '18');
                    circleBg.setAttribute('fill', 'none');
                    circleBg.style.stroke = 'var(--line)';
                    circleBg.style.strokeWidth = '3';

                    var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('class', 'progress-ring__circle');
                    circle.setAttribute('r', '14');
                    circle.setAttribute('cx', '18');
                    circle.setAttribute('cy', '18');
                    circle.setAttribute('fill', 'none');
                    circle.id = 'progress-circle-' + index;
                    circle.style.stroke = 'var(--accent)';
                    circle.style.strokeWidth = '3';
                    circle.style.strokeDasharray = '88';
                    circle.style.strokeDashoffset = '88';
                    circle.style.transition = 'stroke-dashoffset 0.3s ease, stroke 0.3s ease';

                    svg.appendChild(circleBg);
                    svg.appendChild(circle);

                    var progressText = document.createElement('span');
                    progressText.className = 'progress-ring-text';
                    progressText.id = 'progress-text-' + index;
                    progressText.textContent = '0%';

                    progressWrapper.appendChild(svg);
                    progressWrapper.appendChild(progressText);
                    fileWrapper.appendChild(progressWrapper);
                    
                    selectedFileContainer.appendChild(fileWrapper);
                    
                    if (item.isOversized) {
                        hasOversizedFile = true;
                    }
                })(i);
            }
            
            // 校验整体是否超限并控制按钮与提示（统一收拢至 updateLimitUI 集中处理）
            if (typeof updateLimitUI === 'function') {
                updateLimitUI(usedTransfers);
            }
        }

        function readClipboardFiles(clipboardData) {
            var files = [];
            if (!clipboardData) { return files; }
            if (clipboardData.items && clipboardData.items.length) {
                for (var i = 0; i < clipboardData.items.length; i++) {
                    var item = clipboardData.items[i];
                    if (item.kind === 'file') {
                        var blob = item.getAsFile();
                        if (blob) { files.push(blob); }
                    }
                }
            } else if (clipboardData.files && clipboardData.files.length) {
                for (var j = 0; j < clipboardData.files.length; j++) {
                    files.push(clipboardData.files[j]);
                }
            }
            return files;
        }

        function insertTextAtCursor(value) {
            if (!value) { return; }
            if (typeof textArea.setRangeText === 'function' && typeof textArea.selectionStart === 'number') {
                textArea.setRangeText(value, textArea.selectionStart, textArea.selectionEnd, 'end');
            } else {
                var start = textArea.selectionStart || textArea.value.length;
                var end = textArea.selectionEnd || textArea.value.length;
                textArea.value = textArea.value.slice(0, start) + value + textArea.value.slice(end);
            }
            textArea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function renderUploadFailedPage(reason) {
            var displayReason = reason || t('err_reason_default');
            var badgeText = clockTampered ? 'CLOCK ERROR' : (licenseTier ? licenseTier : 'FREE');
            var badgeClass = clockTampered ? 'clock-error' : '';
            
            var failHtml = '<main style="width: min(100%, 480px); padding: 40px 20px; text-align: center; margin: 0 auto;">' +
                '<img class="brand-logo" src="/assets/eqt-logo-horizontal.png" alt="EQT logo" style="display: block; height: auto; max-width: 140px; margin: 0 auto 32px;">' +
                '<div class="status-card" style="background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 32px 24px; box-shadow: 0 10px 30px rgba(17, 24, 39, 0.04); margin-bottom: 24px; position: relative;">' +
                '<span class="license-badge ' + badgeClass + '" style="position: absolute; top: 16px; right: 16px; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 4px; line-height: 1.2; letter-spacing: 0.05em; background: var(--accent); color: #fff;">' +
                badgeText +
                '</span>' +
                '<div class="fail-badge" style="width: 64px; height: 64px; border-radius: 50%; background: #fef3f2; border: 2px solid #fee4e2; color: #d92d20; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; margin-bottom: 18px; box-shadow: 0 4px 12px rgba(217, 45, 32, 0.08);">✕</div>' +
                '<h1 style="margin: 0 0 8px; font-size: 24px; font-weight: 800; color: var(--text-primary);">' + t('fail_header') + '</h1>' +
                '<p class="summary" style="margin: 0 0 24px; color: var(--muted); font-size: 15px; line-height: 1.5;">' +
                displayReason +
                '</p>' +
                '<button id="retry-btn" class="btn" style="width: 100%; border-radius: 6px; font: inherit; font-weight: 800; min-height: 42px; display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: #fff; border: 0; cursor: pointer;">' +
                t('btn_retry') +
                '</button>' +
                '</div>' +
                '</main>';
            
            document.body.innerHTML = failHtml;
            document.getElementById('retry-btn').addEventListener('click', function() {
                window.location.reload();
            });
        }

        textArea.addEventListener('paste', function(e) {
            var clipboardData = e.clipboardData || window.clipboardData;
            var files = readClipboardFiles(clipboardData);
            if (!files.length) { return; }
            e.preventDefault();
            var pastedText = clipboardData && clipboardData.getData ? clipboardData.getData('text/plain') : '';
            if (pastedText) {
                insertTextAtCursor(pastedText);
            }
            for (var i = 0; i < files.length; i++) {
                addFileToAccumulated(files[i]);
            }
            renderFiles();
            saveDraft();
        });

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            errorBox.textContent = '';
            submitButton.value = t('btn_transferring');
            submitButton.disabled = true;

            isUploadStopped = false;
            isUploading = true;
            var stopButton = document.getElementById('stop-btn');
            if (stopButton) {
                stopButton.style.display = 'inline-block';
            }
            
            var filesToUpload = [];
            var totalFilesSize = 0;
            
            var textInput = document.getElementById('plaintext-text');
            if (titleInput.value || textInput.value) {
                var currentDate = new Date().toJSON().slice(0, 19).replace(/[-T:]/g, '_');
                var filename = titleInput.value || ('eqt-text-file-' + currentDate);
                var blob = new Blob([textInput.value + '\n'], { type: 'text/plain' });
                filesToUpload.push({
                    type: 'text',
                    size: blob.size,
                    name: filename + '.txt',
                    blob: blob
                });
                totalFilesSize += blob.size;
            }

            for (var i = 0; i < accumulatedFiles.length; i++) {
                var file = accumulatedFiles[i].file;
                var fileName = accumulatedFiles[i].name;
                filesToUpload.push({
                    type: 'file',
                    size: file.size,
                    name: fileName,
                    index: i,
                    file: file
                });
                totalFilesSize += file.size;
            }

            if (filesToUpload.length === 0) {
                submitButton.disabled = false;
                submitButton.value = t('btn_transfer');
                isUploading = false;
                return;
            }

            // Free tier quota limits validation before starting upload
            var isLimitActive = !isPaidMode && (usedTransfers >= 5);
            if (isLimitActive) {
                var hasOversized = false;
                for (var fIdx = 0; fIdx < filesToUpload.length; fIdx++) {
                    if (filesToUpload[fIdx].size > 50 * 1024 * 1024) {
                        hasOversized = true;
                        break;
                    }
                }
                var hasTooMany = filesToUpload.length > 5;

                if (hasOversized || hasTooMany) {
                    var errorMsg = '';
                    if (hasOversized && hasTooMany) {
                        errorMsg = t('err_free_limit_both_global');
                    } else if (hasTooMany) {
                        errorMsg = t('err_free_limit_files_global');
                    } else {
                        errorMsg = t('err_free_limit_size_global');
                    }
                    
                    errorBox.textContent = errorMsg;
                    errorBox.style.display = 'block';
                    
                    submitButton.disabled = false;
                    submitButton.value = t('btn_transfer');
                    
                    if (stopButton) {
                        stopButton.style.display = 'none';
                    }
                    if (typeof triggerFastPolling === 'function') {
                        triggerFastPolling();
                    }
                    isUploading = false;
                    return; // Prevent form submit
                }
            }

            // 隐藏所有删除按钮，显示进度圆圈
            var allDeleteBtns = selectedFileContainer.querySelectorAll('button');
            for (var dIdx = 0; dIdx < allDeleteBtns.length; dIdx++) {
                allDeleteBtns[dIdx].style.display = 'none';
            }
            var allProgressWrappers = selectedFileContainer.querySelectorAll('.progress-ring-wrapper');
            for (var pIdx = 0; pIdx < allProgressWrappers.length; pIdx++) {
                allProgressWrappers[pIdx].style.display = 'inline-flex';
            }

            // Disable inputs
            titleInput.disabled = true;
            textArea.disabled = true;
            fileInput.disabled = true;
            var addFilesLabel = document.querySelector('label[for="files"]');
            if (addFilesLabel) {
                addFilesLabel.style.pointerEvents = 'none';
                addFilesLabel.style.opacity = '0.5';
            }



            function handleError(status, text) {
                var stopButton = document.getElementById('stop-btn');
                if (stopButton) {
                    stopButton.style.display = 'none';
                }
                var reason = '';
                if (status === 413) {
                    reason = t('err_reason_too_large') + (text ? ' (' + text + ')' : '');
                } else if (status === 403) {
                    reason = text || t('err_reason_default');
                } else if (status === 500) {
                    reason = t('err_reason_server') + (text ? ' (' + text + ')' : '');
                } else if (status) {
                    reason = t('err_reason_default') + ' (' + text + ')';
                } else {
                    reason = t('err_reason_network');
                }
                renderUploadFailedPage(reason);
            }

            var uploadIndex = 0;
            var bytesUploadedMap = {};
            
            function startNextTusUpload() {
                if (isUploadStopped) { return; }
                if (uploadIndex >= filesToUpload.length) {
                    var stopButton = document.getElementById('stop-btn');
                    if (stopButton) {
                        stopButton.style.display = 'none';
                    }
                    var doneXhr = new XMLHttpRequest();
                    doneXhr.open('POST', '{{.Route}}?done=true&client_id=' + encodeURIComponent(clientID));
                    doneXhr.onload = function() {
                        if (doneXhr.status >= 200 && doneXhr.status < 300) {
                            clearDraft();
                            clearAccumulatedFiles();
                            
                            var html = doneXhr.responseText;
                            var parser = new DOMParser();
                            var nextDoc = parser.parseFromString(html, 'text/html');
                            document.title = nextDoc.title || document.title;
                            document.head.innerHTML = nextDoc.head.innerHTML;
                            document.body.innerHTML = nextDoc.body.innerHTML;
                            var scripts = document.body.querySelectorAll('script');
                            for (var sIdx = 0; sIdx < scripts.length; sIdx++) {
                                var oldScript = scripts[sIdx];
                                var newScript = document.createElement('script');
                                for (var attrIdx = 0; attrIdx < oldScript.attributes.length; attrIdx++) {
                                    var attr = oldScript.attributes[attrIdx];
                                    newScript.setAttribute(attr.name, attr.value);
                                }
                                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                                oldScript.parentNode.replaceChild(newScript, oldScript);
                            }
                        } else if (doneXhr.status === 410) {
                            clearDraft();
                            clearAccumulatedFiles();
                            var isZh = (currentLang === 'zh');
                            var title = isZh ? "传输已成功完成" : "Transfer Completed";
                            var subtitle = isZh ? "所有文件已成功保存到接收端电脑中。" : "All files have been successfully saved to the receiving computer.";
                            var doneHtml = '<div style="max-width: 480px; margin: 80px auto; padding: 32px 24px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, \'Segoe UI\', Roboto, Helvetica, Arial, sans-serif; color: var(--text);">' +
                                '<div style="font-size: 72px; margin-bottom: 24px; color: var(--success); line-height: 1;">✓</div>' +
                                '<h2 style="font-size: 24px; font-weight: 700; margin-bottom: 12px; color: var(--text);">' + title + '</h2>' +
                                '<p style="font-size: 14px; line-height: 1.6; color: var(--text-muted); margin-bottom: 24px; word-break: break-all;">' + subtitle + '</p>' +
                                '</div>';
                            document.body.innerHTML = doneHtml;
                        } else {
                            handleError(doneXhr.status, doneXhr.responseText);
                        }
                    };
                    doneXhr.onerror = function() {
                        handleError(0, '');
                    };
                    doneXhr.send();
                    return;
                }

                var item = filesToUpload[uploadIndex];
                var uploadBlob = item.type === 'text' ? item.blob : item.file;
                
                var upload = new tus.Upload(uploadBlob, {
                    endpoint: '{{.Route}}/tus/?client_id=' + encodeURIComponent(clientID),
                    retryDelays: [0, 1000, 3000, 5000, 10000],
                    metadata: {
                        filename: item.name,
                        clientid: clientID,
                        devicename: '{{.DeviceName}}',
                        totalsize: totalFilesSize.toString(),
                        totalfiles: filesToUpload.length.toString()
                    },
                    onError: function(error) {
                        console.error("Tus upload error: ", error);
                        if (item.index !== undefined) {
                            var circle = document.getElementById('progress-circle-' + item.index);
                            var text = document.getElementById('progress-text-' + item.index);
                            if (circle) {
                                circle.style.strokeDashoffset = 0;
                                circle.classList.add('failed');
                                circle.style.stroke = 'var(--danger)';
                            }
                            if (text) {
                                text.textContent = '✕';
                                text.style.color = 'var(--danger)';
                            }
                        }
                        isUploading = false;
                        handleError(500, error.message);
                    },
                    onProgress: function(bytesSent, bytesTotal) {
                        bytesUploadedMap[uploadIndex] = bytesSent;
                        var totalUploaded = 0;
                        for (var k = 0; k < filesToUpload.length; k++) {
                            totalUploaded += (bytesUploadedMap[k] || 0);
                        }
                        var globalPercent = Math.min(100, Math.round((totalUploaded / totalFilesSize) * 100));
                        submitButton.value = t('btn_transferring') + ' (' + globalPercent + '%)';
                        
                        if (item.index !== undefined) {
                            var percent = Math.min(100, Math.round((bytesSent / bytesTotal) * 100));
                            var circle = document.getElementById('progress-circle-' + item.index);
                            var text = document.getElementById('progress-text-' + item.index);
                            if (circle) {
                                var offset = 88 - (88 * percent) / 100;
                                circle.style.strokeDashoffset = offset;
                            }
                            if (text) {
                                text.textContent = percent + '%';
                            }
                        }
                    },
                    onSuccess: function() {
                        bytesUploadedMap[uploadIndex] = item.size;
                        if (item.index !== undefined) {
                            var circle = document.getElementById('progress-circle-' + item.index);
                            var text = document.getElementById('progress-text-' + item.index);
                            if (circle) {
                                circle.style.strokeDashoffset = 0;
                                circle.classList.add('completed');
                                circle.style.stroke = 'var(--success)';
                            }
                            if (text) {
                                text.textContent = '✓';
                                text.style.color = 'var(--success)';
                            }
                        }
                        uploadIndex++;
                        startNextTusUpload();
                    }
                });

                currentTusUpload = upload;
                upload.start();
            }

            // Send init request to register all files before starting TUS upload loop
            var initXhr = new XMLHttpRequest();
            initXhr.open('POST', '{{.Route}}?init=true&client_id=' + encodeURIComponent(clientID));
            initXhr.setRequestHeader('Content-Type', 'application/json');
            initXhr.onload = function() {
                startNextTusUpload();
            };
            initXhr.onerror = function() {
                startNextTusUpload();
            };
            var initData = {
                files: filesToUpload.map(function(f) {
                    return { name: f.name, size: f.size };
                })
            };
            initXhr.send(JSON.stringify(initData));
        });

        var stopButton = document.getElementById('stop-btn');
        if (stopButton) {
            stopButton.addEventListener('click', function() {
                isUploadStopped = true;
                if (currentTusUpload) {
                    try {
                        currentTusUpload.abort();
                    } catch (e) {
                        console.error("Failed to abort tus: ", e);
                    }
                }
                var stopXhr = new XMLHttpRequest();
                stopXhr.open('POST', '{{.Route}}?stop=true&client_id=' + encodeURIComponent(clientID));
                stopXhr.send();

                stopButton.style.display = 'none';
                renderUploadFailedPage(t('err_manually_stopped'));
            });
        }

        var langSelect = document.getElementById('page-lang-select');
        if (langSelect) {
            langSelect.addEventListener('change', function() {
                currentLang = langSelect.value;
                window.localStorage.setItem('eqt_lang', currentLang);
                window.localStorage.setItem('eqt-page-lang', currentLang);
                document.cookie = "eqt-lang=" + encodeURIComponent(currentLang) + ";path=/;max-age=31536000";
                applyLanguage();
            });
        }

        titleInput.addEventListener('input', updateDraftState);
        textArea.addEventListener('input', updateDraftState);
        
        fileInput.addEventListener('change', function() {
            if (!fileInput.files || !fileInput.files.length) { return; }
            for (var i = 0; i < fileInput.files.length; i++) {
                addFileToAccumulated(fileInput.files[i]);
            }
            fileInput.value = ''; // clear value so change event triggers again for the same file
            renderFiles();
        });

        window.addEventListener('beforeunload', function(e) {
            if (!titleInput.value.trim() && !textArea.value.trim() && !accumulatedFiles.length) {
                return;
            }
            e.preventDefault();
            e.returnValue = '';
            return '';
        });

        restoreDraft();
        applyLanguage();
        resizeTextArea();

        function updateLimitUI(count) {
            var oldTransfers = usedTransfers;
            usedTransfers = count;
            isPaidMode = isPaid && !clockTampered;
            
            // 是否处于“超限受限传输”激活期
            var isLimitActive = !isPaidMode && (usedTransfers >= 5);

            // Re-render select list to clear oversized/overcount badge when quota changes
            if (oldTransfers !== usedTransfers) {
                renderFiles();
            }

            var hasOversizedFile = false;
            for (var i = 0; i < accumulatedFiles.length; i++) {
                if (accumulatedFiles[i].isOversized) {
                    hasOversizedFile = true;
                    break;
                }
            }
            var isCountExceeded = isLimitActive && (accumulatedFiles.length > 5);
            var isSizeExceeded = isLimitActive && hasOversizedFile;

            // 1. 更新顶部 left X 胶囊 Badge
            var countdownEl = document.getElementById('plus-countdown');
            if (countdownEl && !isPaidMode) {
                var remaining = Math.max(0, 5 - usedTransfers);
                if (remaining > 0) {
                    countdownEl.style.display = 'inline-flex';
                    countdownEl.innerHTML = t('badge_left') + '<span style="font-size: 15px; font-weight: 900; margin-top: 2px; color: var(--danger);">' + remaining + '</span>';
                } else {
                    countdownEl.style.display = 'none';
                }
            } else if (countdownEl) {
                countdownEl.style.display = 'none';
            }

            // 2. 更新顶部的通告 Banner 状态与文本
            var bannerEl = document.getElementById('quota-banner');
            if (bannerEl) {
                if (!isPaidMode) {
                    bannerEl.style.display = 'block';
                    if (isCountExceeded && isSizeExceeded) {
                        var text = t('err_free_limit_both_global');
                        bannerEl.innerHTML = '<div class="quota-banner-card exceeded">' +
                            '<span>' + text + '</span>' +
                            '</div>';
                    } else if (isCountExceeded) {
                        var text = t('err_free_limit_files_global');
                        bannerEl.innerHTML = '<div class="quota-banner-card exceeded">' +
                            '<span>' + text + '</span>' +
                            '</div>';
                    } else if (isSizeExceeded) {
                        var text = t('err_free_limit_size_global');
                        bannerEl.innerHTML = '<div class="quota-banner-card exceeded">' +
                            '<span>' + text + '</span>' +
                            '</div>';
                     } else if (isLimitActive) {
                         // 次数已用尽，但当前文件没有超标，显示一般超限警告（此时允许在规格内传输，不卡关）
//                          var text = t('quota_exceeded');
//                          bannerEl.innerHTML = '<div class="quota-banner-card exceeded">' +
//                              '<span>' + text + '</span>' +
//                              '</div>';
                         bannerEl.innerHTML = '';
                    } else {
                        // 在全功能可用额度内 (remaining >= 1)
                        var remaining = Math.max(0, 5 - usedTransfers);
                        var text = t('quota_info').replace('{remaining}', remaining);
                        bannerEl.innerHTML = '<div class="quota-banner-card">' +
                            '<span style="font-size: 16px;">ℹ️</span>' +
                            '<span>' + text + '</span>' +
                            '</div>';
                    }
                } else {
                    bannerEl.style.display = 'none';
                }
            }

            // 3. 对列表元素样式进行重置（不再锁定，允许删除）
            var wrappers = selectedFileContainer.querySelectorAll('.pasted-file-wrapper');
            for (var wIdx = 0; wIdx < wrappers.length; wIdx++) {
                wrappers[wIdx].style.pointerEvents = 'auto';
                wrappers[wIdx].style.opacity = '1';
            }

            // 4. 控制“开始传输”按钮的禁用置灰状态与输入框可用性
            // 只有当有规格超限（文件数 > 5 或 大小 > 50MB）时，或没有文件且文本内容为空时，才禁用提交按钮。其他任何时候均允许提交！
            var isDraftEmpty = (accumulatedFiles.length === 0) && (textArea.value.trim() === "");
            if (isCountExceeded || isSizeExceeded || isDraftEmpty) {
                submitButton.disabled = true;
                submitButton.style.opacity = '0.5';
                submitButton.style.cursor = 'not-allowed';
            } else {
                submitButton.disabled = false;
                submitButton.style.opacity = '1';
                submitButton.style.cursor = 'pointer';
            }

            // 确保所有的常规输入框始终保持畅通可用状态
            titleInput.disabled = false;
            textArea.disabled = false;
            fileInput.disabled = false;
            var addFilesLabel = document.querySelector('label[for="files"]');
            if (addFilesLabel) {
                addFilesLabel.style.pointerEvents = 'auto';
                addFilesLabel.style.opacity = '1';
            }
        }

        var pingTimer = null;
        var fastPollCount = 0;

        // Start heartbeat to keep device connected state alive on receiver
        function sendPing() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', window.location.pathname + '?ping=true&client_id=' + encodeURIComponent(clientID), true);
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var res = JSON.parse(xhr.responseText);
                        if (res) {
                            if (typeof res.isPaid !== 'undefined') {
                                isPaid = res.isPaid;
                                var tierBadge = document.getElementById('tier-badge');
                                if (tierBadge) {
                                    if (isPaid) {
                                        tierBadge.textContent = res.licenseTier || 'PLUS';
                                        tierBadge.classList.remove('clock-error');
                                    } else {
                                        tierBadge.textContent = 'FREE';
                                        tierBadge.classList.remove('clock-error');
                                    }
                                }
                            }
                            if (typeof res.usedTransfers !== 'undefined') {
                                var oldTransfers = usedTransfers;
                                updateLimitUI(res.usedTransfers);

                                // If quota has been reset to 0, stop fast polling
                                if (res.usedTransfers === 0 && oldTransfers > 0) {
                                    fastPollCount = 0;
                                    resetPolling(4000);
                                } else if (fastPollCount > 0) {
                                    fastPollCount--;
                                    if (fastPollCount === 0) {
                                        resetPolling(4000);
                                    }
                                }
                            }
                        }
                    } catch (e) {
                        console.error("Failed to parse ping response", e);
                    }
                }
            };
            xhr.send();
        }

        function resetPolling(interval) {
            if (pingTimer) {
                clearInterval(pingTimer);
            }
            pingTimer = setInterval(sendPing, interval);
        }

        function triggerFastPolling() {
            fastPollCount = 6;  // 6 times fast polling (approx 9 seconds duration)
            sendPing();
            resetPolling(1500); // 1.5s fast interval
        }

        sendPing();
        resetPolling(4000);

        // Plus limit logic for Free tier
        updateLimitUI(usedTransfers);
    </script>
</body>
</html>
