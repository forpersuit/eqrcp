<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Send to EQT</title>
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #fff;
            --surface-soft: #f7faf9;
            --line: #d8e0dd;
            --text: #17211f;
            --muted: #66736f;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #b42318;
        }
        * {
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI Variable Display", "Segoe UI", "Aptos", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        main {
            margin: 0 auto;
            max-width: 760px;
            padding: 22px 16px 34px;
        }
        .brand {
            align-items: center;
            display: grid;
            gap: 12px;
            grid-template-columns: 52px minmax(0, 1fr);
            margin-bottom: 18px;
        }
        .upload-logo {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
            height: 52px;
            padding: 7px;
            width: 52px;
        }
        h1 {
            font-size: clamp(28px, 8vw, 42px);
            line-height: 1.05;
            margin: 0 0 6px;
        }
        p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
        .upload-composer {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.07);
            padding: 16px;
        }
        .composer-meta {
            align-items: center;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .label {
            color: var(--text);
            display: block;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }
        .composer-actions {
            display: flex;
            flex-shrink: 0;
        }
        .composer-grid {
            display: grid;
            gap: 12px;
        }
        label {
            color: #334155;
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input,
        textarea,
        .btn {
            border-radius: 6px;
            font: inherit;
        }
        .form-control {
            background: #fff;
            border: 1px solid #cbd5e1;
            color: var(--text);
            min-height: 44px;
            padding: 11px 12px;
            width: 100%;
        }
        textarea.form-control {
            line-height: 1.55;
            min-height: 180px;
            resize: vertical;
        }
        .form-control:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            outline: none;
        }
        .btn {
            align-items: center;
            background: var(--accent);
            border: 0;
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            font-size: 14px;
            font-weight: 800;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: var(--accent-strong);
        }
        .btn-secondary {
            background: #334155;
        }
        .submit-row {
            display: grid;
            margin-top: 2px;
        }
        #submit:disabled {
            cursor: default;
            opacity: 0.7;
        }
        #selected-file-container,
        #pasted-file-container {
            display: grid;
            gap: 10px;
        }
        .pasted-file-wrapper {
            background: var(--surface-soft);
            border: 1px dashed #86b7b1;
            border-radius: 8px;
            padding: 10px;
        }
        .file-info {
            align-items: center;
            display: grid;
            gap: 10px;
            grid-template-columns: 34px minmax(0, 1fr);
        }
        .file-icon {
            align-items: center;
            background: #e7f3f1;
            border-radius: 6px;
            color: var(--accent);
            display: inline-flex;
            font-size: 20px;
            height: 34px;
            justify-content: center;
            width: 34px;
        }
        .file-name {
            color: var(--text);
            font-size: 14px;
            overflow-wrap: anywhere;
        }
        .pasted-file-wrapper img {
            border-radius: 6px;
            display: block;
            height: auto;
            max-width: 100%;
        }
        .error {
            color: var(--danger);
            font-size: 13px;
            min-height: 18px;
        }
        .lang-switch-container {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
        }
        #page-lang-select {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            padding: 6px 8px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }
        @media (max-width: 560px) {
            main {
                padding: 16px 12px 28px;
            }
            .composer-meta {
                align-items: stretch;
                flex-direction: column;
            }
            .composer-actions,
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main>
        <header class="brand">
            <img class="upload-logo" src="/assets/eqt-logo-mark.png" alt="EQT logo">
            <div>
                <h1 data-i18n="title">Send to this device</h1>
                <p data-i18n="subtitle">Add files, paste an image, or write text. EQT saves everything on the receiving computer.</p>
            </div>
        </header>
        <form id="upload-form" class="upload-composer">
            <div class="composer-meta">
                <div>
                    <strong class="label" data-i18n="composer">Composer</strong>
                    <div class="hint" data-i18n="composer_hint">Text becomes a .txt file. Shift+Enter keeps a new line.</div>
                </div>
                <div class="composer-actions">
                    <label for="files" class="btn btn-secondary" data-i18n="add_files">Add files</label>
                    <input class="form-control-file" type="file" id="files" name="files" multiple hidden>
                </div>
            </div>
            <div class="composer-grid">
                <div>
                    <label for="plaintext-title" data-i18n="file_name_label">Text file name</label>
                    <input class="form-control" id="plaintext-title" data-i18n-placeholder="file_name_placeholder" placeholder="Optional file name">
                </div>
                <div>
                    <label for="plaintext-text" data-i18n="text_label">Text</label>
                    <textarea class="form-control" id="plaintext-text" data-i18n-placeholder="text_placeholder" placeholder="Write text or paste files here"></textarea>
                </div>
                <div id="selected-file-container"></div>
                <div id="pasted-file-container"></div>
                <div class="error" id="upload-error" aria-live="polite"></div>
                <div class="submit-row">
                    <input class="btn" type="submit" id="submit" name="submit" data-i18n-value="btn_transfer" value="Transfer">
                </div>
            </div>
        </form>
        <div class="lang-switch-container">
            <select id="page-lang-select" aria-label="Switch Language">
                <option value="zh">简体中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="es">Español</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </main>
    <script>
        var pageTranslations = {
            zh: {
                title: '发送文件到此设备',
                subtitle: '您可以添加文件、粘贴截图或直接输入文本。EQT 将为您自动保存到接收端电脑中。',
                composer: '文本编辑器',
                composer_hint: '输入的文本将被保存为 .txt 文件。换行请按 Shift+Enter。',
                add_files: '添加文件',
                file_name_label: '文本文件名',
                file_name_placeholder: '可选的文件名（留空自动生成）',
                text_label: '文本内容',
                text_placeholder: '在这里直接输入文字，或在此处粘贴截图或文件',
                btn_transfer: '开始传输',
                btn_transferring: '正在传输...',
                err_failed: '传输失败，请保持此页面打开并重试。'
            },
            en: {
                title: 'Send to this device',
                subtitle: 'Add files, paste an image, or write text. EQT saves everything on the receiving computer.',
                composer: 'Composer',
                composer_hint: 'Text becomes a .txt file. Shift+Enter keeps a new line.',
                add_files: 'Add files',
                file_name_label: 'Text file name',
                file_name_placeholder: 'Optional file name',
                text_label: 'Text',
                text_placeholder: 'Write text or paste files here',
                btn_transfer: 'Transfer',
                btn_transferring: 'Transferring...',
                err_failed: 'Transfer failed. Keep this page open and try again.'
            },
            ja: {
                title: 'このデバイスにファイルを送信',
                subtitle: 'ファイルを追加、スクリーンショットを貼り付け、またはテキストを直接入力できます。EQT が受信側のコンピュータに自動的に保存します。',
                composer: 'テキストエディタ',
                composer_hint: '入力されたテキストは .txt ファイルとして保存されます。改行は Shift+Enter を押してください。',
                add_files: 'ファイルを追加',
                file_name_label: 'テキストファイル名',
                file_name_placeholder: '任意のファイル名（空欄の場合は自動生成）',
                text_label: 'テキスト内容',
                text_placeholder: 'ここにテキストを直接入力するか、スクリーンショットやファイルを貼り付けます',
                btn_transfer: '転送開始',
                btn_transferring: '転送中...',
                err_failed: '転送に失敗しました。このページを開いたままにして再試行してください。'
            },
            ko: {
                title: '이 기기로 파일 전송',
                subtitle: '파일을 추가하거나 스크린샷을 붙여넣거나 텍스트를 직접 입력할 수 있습니다. EQT가 수신 측 컴퓨터에 자동으로 저장합니다.',
                composer: '텍스트 편집기',
                composer_hint: '입력한 텍스트는 .txt 파일로 저장됩니다. 줄바꿈은 Shift+Enter를 누르세요.',
                add_files: '파일 추가',
                file_name_label: '텍스트 파일 이름',
                file_name_placeholder: '선택적 파일 이름 (비워 두면 자동 생성)',
                text_label: '텍스트 내용',
                text_placeholder: '여기에 텍스트를 직접 입력하거나 스크린샷 또는 파일을 붙여넣으십시오',
                btn_transfer: '전송 시작',
                btn_transferring: '전송 중...',
                err_failed: '전송에 실패했습니다. 이 페이지를 열어두고 다시 시도하십시오.'
            },
            es: {
                title: 'Enviar archivos a este dispositivo',
                subtitle: 'Puede añadir archivos, pegar capturas de pantalla o escribir texto directamente. EQT lo guardará automáticamente en el ordenador receptor.',
                composer: 'Editor de texto',
                composer_hint: 'El texto introducido se guardará como un archivo .txt. Pulse Shift+Enter para una nueva línea.',
                add_files: 'Añadir archivos',
                file_name_label: 'Nombre del archivo de texto',
                file_name_placeholder: 'Nombre de archivo opcional (vacío para generación automática)',
                text_label: 'Contenido del texto',
                text_placeholder: 'Escriba texto directamente aquí, o pegue capturas de pantalla o archivos',
                btn_transfer: 'Iniciar transferencia',
                btn_transferring: 'Transfiriendo...',
                err_failed: 'Error de transferencia. Mantenga esta página abierta e inténtelo de nuevo.'
            },
            de: {
                title: 'Dateien an dieses Gerät senden',
                subtitle: 'Sie können Dateien hinzufügen, Screenshots einfügen oder Text direkt eingeben. EQT speichert dies automatisch auf dem Empfänger-Computer.',
                composer: 'Text-Editor',
                composer_hint: 'Eingegebener Text wird als .txt Datei gespeichert. Drücken Sie Shift+Enter für eine neue Zeile.',
                add_files: 'Dateien hinzufügen',
                file_name_label: 'Dateiname des Textes',
                file_name_placeholder: 'Optionaler Dateiname (leer lassen für automatische Generierung)',
                text_label: 'Textinhalt',
                text_placeholder: 'Geben Sie hier Text direkt ein, oder fügen Sie Screenshots oder Dateien ein',
                btn_transfer: 'Übertragung starten',
                btn_transferring: 'Übertrage...',
                err_failed: 'Übertragung fehlgeschlagen. Bitte lassen Sie diese Seite geöffnet und versuchen Sie es erneut.'
            },
            fr: {
                title: 'Envoyer des fichiers vers cet appareil',
                subtitle: 'Vous pouvez ajouter des fichiers, coller des captures d\'écran ou saisir du texte directement. EQT les enregistrera automatiquement sur l\'ordinateur destinataire.',
                composer: 'Éditeur de texte',
                composer_hint: 'Le texte saisi sera enregistré sous forme de fichier .txt. Appuyez sur Shift+Enter pour sauter une ligne.',
                add_files: 'Ajouter des fichiers',
                file_name_label: 'Nom du fichier texte',
                file_name_placeholder: 'Nom de fichier facultatif (laisser vide pour génération automatique)',
                text_label: 'Contenu du texte',
                text_placeholder: 'Saisissez du texte directement ici, ou collez des captures d\'écran ou des fichiers',
                btn_transfer: 'Démarrer le transfert',
                btn_transferring: 'Transfert en cours...',
                err_failed: 'Échec du transfert. Veuillez garder cette page ouverte et réessayer.'
            }
        };

        var supportedLangs = {
            zh: true,
            en: true,
            ja: true,
            ko: true,
            es: true,
            de: true,
            fr: true
        };
        var serverLang = '{{.Lang}}';
        var currentLang = 'zh';
        var userLang = (navigator.language || navigator.userLanguage || 'zh').toLowerCase().split('-')[0];
        if (supportedLangs[serverLang]) {
            currentLang = serverLang;
        } else if (supportedLangs[userLang]) {
            currentLang = userLang;
        } else {
            currentLang = 'en';
        }
        var savedLang = window.localStorage.getItem('eqt-page-lang');
        if (savedLang && supportedLangs[savedLang]) {
            currentLang = savedLang;
        }

        function mergeDict(target, source) {
            if (!source) return;
            for (var k in source) {
                if (source.hasOwnProperty(k)) {
                    target[k] = source[k];
                }
            }
        }

        function t(key) {
            var dict = {};
            mergeDict(dict, pageTranslations.en);
            if (pageTranslations[currentLang]) {
                mergeDict(dict, pageTranslations[currentLang]);
            }
            return dict[key] || '';
        }

        function applyLanguage() {
            var dict = {};
            mergeDict(dict, pageTranslations.en);
            if (pageTranslations[currentLang]) {
                mergeDict(dict, pageTranslations[currentLang]);
            }

            var elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                if (dict[key] !== undefined) {
                    el.textContent = dict[key];
                }
            });
            var placeholders = document.querySelectorAll('[data-i18n-placeholder]');
            placeholders.forEach(function(el) {
                var key = el.getAttribute('data-i18n-placeholder');
                if (dict[key] !== undefined) {
                    el.setAttribute('placeholder', dict[key]);
                }
            });
            var values = document.querySelectorAll('[data-i18n-value]');
            values.forEach(function(el) {
                var key = el.getAttribute('data-i18n-value');
                if (dict[key] !== undefined) {
                    el.value = dict[key];
                }
            });
            document.title = currentLang === 'zh' ? '发送到 EQT' : (currentLang === 'ja' ? 'EQTに送信' : 'Send to EQT');
            var langSelect = document.getElementById('page-lang-select');
            if (langSelect) {
                langSelect.value = currentLang;
            }
        }

        var uploadForm = document.getElementById('upload-form');
        var pastedFiles = [];
        var draftKey = 'eqt-upload-draft:' + window.location.pathname;
        var submitButton = document.getElementById('submit');
        var titleInput = document.getElementById('plaintext-title');
        var textArea = document.getElementById('plaintext-text');
        var fileInput = document.getElementById('files');
        var selectedFileContainer = document.getElementById('selected-file-container');
        var pastedFileContainer = document.getElementById('pasted-file-container');
        var errorBox = document.getElementById('upload-error');

        function readDraft() {
            try {
                var raw = window.localStorage.getItem(draftKey);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function saveDraft() {
            var draft = {
                title: titleInput.value,
                text: textArea.value
            };
            try {
                if (!draft.title && !draft.text) {
                    window.localStorage.removeItem(draftKey);
                    return;
                }
                window.localStorage.setItem(draftKey, JSON.stringify(draft));
            } catch (e) {
                // Draft storage is best-effort only.
            }
        }

        function clearDraft() {
            try {
                window.localStorage.removeItem(draftKey);
            } catch (e) {
                // Ignore storage failures when clearing.
            }
        }

        function restoreDraft() {
            var draft = readDraft();
            if (!draft) { return; }
            titleInput.value = draft.title || '';
            textArea.value = draft.text || '';
        }

        function resizeTextArea() {
            textArea.style.height = 'auto';
            textArea.style.height = Math.min(textArea.scrollHeight, 260) + 'px';
        }

        function updateDraftState() {
            resizeTextArea();
            saveDraft();
        }

        function appendPastedFile(blob, index) {
            if (!blob) { return; }
            pastedFiles.push(blob);

            var fileWrapper = document.createElement('div');
            fileWrapper.className = 'pasted-file-wrapper';

            if (blob.type && blob.type.indexOf('image/') === 0) {
                var img = document.createElement('img');
                img.src = URL.createObjectURL(blob);
                img.alt = blob.name || 'Pasted image';
                fileWrapper.appendChild(img);
            } else {
                var fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';

                var fileIcon = document.createElement('span');
                fileIcon.className = 'file-icon';
                fileIcon.innerHTML = '&#128196;';

                var fileName = document.createElement('span');
                fileName.className = 'file-name';
                fileName.textContent = blob.name || ('Pasted File ' + (index + 1));

                fileInfo.appendChild(fileIcon);
                fileInfo.appendChild(fileName);
                fileWrapper.appendChild(fileInfo);
            }

            pastedFileContainer.appendChild(fileWrapper);
        }

        function renderSelectedFiles() {
            selectedFileContainer.innerHTML = '';
            if (!fileInput.files || !fileInput.files.length) { return; }
            for (var i = 0; i < fileInput.files.length; i++) {
                var file = fileInput.files[i];
                var fileWrapper = document.createElement('div');
                fileWrapper.className = 'pasted-file-wrapper';
                var fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';
                var fileIcon = document.createElement('span');
                fileIcon.className = 'file-icon';
                fileIcon.innerHTML = '&#128196;';
                var fileName = document.createElement('span');
                fileName.className = 'file-name';
                fileName.textContent = file.name;
                fileInfo.appendChild(fileIcon);
                fileInfo.appendChild(fileName);
                fileWrapper.appendChild(fileInfo);
                selectedFileContainer.appendChild(fileWrapper);
            }
        }

        function readClipboardFiles(clipboardData) {
            var files = [];
            if (!clipboardData) { return files; }
            if (clipboardData.items && clipboardData.items.length) {
                for (var i = 0; i < clipboardData.items.length; i++) {
                    var item = clipboardData.items[i];
                    if (item.kind === 'file') {
                        var blob = item.getAsFile();
                        if (blob) { files.push(blob); }
                    }
                }
            } else if (clipboardData.files && clipboardData.files.length) {
                for (var j = 0; j < clipboardData.files.length; j++) {
                    files.push(clipboardData.files[j]);
                }
            }
            return files;
        }

        function insertTextAtCursor(value) {
            if (!value) { return; }
            if (typeof textArea.setRangeText === 'function' && typeof textArea.selectionStart === 'number') {
                textArea.setRangeText(value, textArea.selectionStart, textArea.selectionEnd, 'end');
            } else {
                var start = textArea.selectionStart || textArea.value.length;
                var end = textArea.selectionEnd || textArea.value.length;
                textArea.value = textArea.value.slice(0, start) + value + textArea.value.slice(end);
            }
            textArea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        textArea.addEventListener('paste', function(e) {
            var clipboardData = e.clipboardData || window.clipboardData;
            var files = readClipboardFiles(clipboardData);
            if (!files.length) { return; }
            e.preventDefault();
            var pastedText = clipboardData && clipboardData.getData ? clipboardData.getData('text/plain') : '';
            if (pastedText) {
                insertTextAtCursor(pastedText);
            }
            for (var i = 0; i < files.length; i++) {
                appendPastedFile(files[i], i);
            }
            saveDraft();
        });

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            errorBox.textContent = '';
            submitButton.value = t('btn_transferring');
            submitButton.disabled = true;
            var formData = new FormData(uploadForm);
            var textInput = document.getElementById('plaintext-text');

            if (titleInput.value || textInput.value) {
                var currentDate = new Date().toJSON().slice(0, 19).replace(/[-T:]/g, '_');
                var filename = titleInput.value || ('eqt-text-file-' + currentDate);
                var blob = new Blob([textInput.value + '\n'], { type: 'text/plain' });
                formData.append('textFile', blob, filename + '.txt');
            }

            for (var i = 0; i < pastedFiles.length; i++) {
                var file = pastedFiles[i];
                var fileName = file.name || ('pasted_file_' + i);
                formData.append('files', file, fileName);
            }

            fetch('{{.Route}}', {
                method: 'POST',
                body: formData
            }).then(function(response) {
                if (!response.ok) {
                    throw new Error('Upload failed');
                }
                return response.text();
            }).then(function(html) {
                clearDraft();
                pastedFiles = [];
                pastedFileContainer.innerHTML = '';
                var parser = new DOMParser();
                var nextDoc = parser.parseFromString(html, 'text/html');
                document.title = nextDoc.title || document.title;
                document.head.innerHTML = nextDoc.head.innerHTML;
                document.body.innerHTML = nextDoc.body.innerHTML;
                var scripts = document.body.querySelectorAll('script');
                for (var i = 0; i < scripts.length; i++) {
                    var oldScript = scripts[i];
                    var newScript = document.createElement('script');
                    for (var j = 0; j < oldScript.attributes.length; j++) {
                        var attr = oldScript.attributes[j];
                        newScript.setAttribute(attr.name, attr.value);
                    }
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                }
            }).catch(function() {
                errorBox.textContent = t('err_failed');
                submitButton.value = t('btn_transfer');
                submitButton.disabled = false;
            });
        });

        var langSelect = document.getElementById('page-lang-select');
        if (langSelect) {
            langSelect.addEventListener('change', function() {
                currentLang = langSelect.value;
                window.localStorage.setItem('eqt_lang', currentLang);
                window.localStorage.setItem('eqt-page-lang', currentLang);
                applyLanguage();
            });
        }

        titleInput.addEventListener('input', updateDraftState);
        textArea.addEventListener('input', updateDraftState);
        fileInput.addEventListener('change', renderSelectedFiles);
        window.addEventListener('beforeunload', function(e) {
            if (!titleInput.value.trim() && !textArea.value.trim() && !pastedFiles.length) {
                return;
            }
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        restoreDraft();
        applyLanguage();
        resizeTextArea();
    </script>
</body>
</html>
